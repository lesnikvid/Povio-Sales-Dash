                    <Modal
                        isOpen={!!editingWhale}
                        onClose={() => setEditingWhale(null)}
                        title="Edit Whale Account"
                    >
                        {editingWhale && (
                            <WhaleEditForm
                                whale={editingWhale}
                                onSave={handleSaveWhale}
                                onCancel={() => setEditingWhale(null)}
                            />
                        )}
                    </Modal>

                    {/* Add Note Modal */}
                    <Modal
                        isOpen={!!addingNote}
                        onClose={() => setAddingNote(null)}
                        title="Add Note"
                    >
                        {addingNote && (
                            <AddNoteForm
                                onSave={(noteData) => handleSaveNote(noteData, user.id, user.name || user.email)}
                                onCancel={() => setAddingNote(null)}
                            />
                        )}
                    </Modal>

                    {/* View History Modal */}
                    <Modal
                        isOpen={!!viewingHistory}
                        onClose={() => setViewingHistory(null)}
                        title={`Account History - ${viewingHistory?.name || ''}`}
                    >
                        {viewingHistory && (
                            <NotesHistoryModal
                                notes={whaleNotes[viewingHistory.id] || []}
                                onClose={() => setViewingHistory(null)}
                                onAddNote={() => handleAddNoteClick(viewingHistory)}
                            />
                        )}
                    </Modal>
                </>
            );
        };

        // ==================== LOGIN SCREEN ====================
        const LoginScreen = ({ onLogin }) => {
            return (
                <div className="login-container">
                    <div className="login-card">
                        <div className="login-logo">
                            <PovioLogo />
                        </div>
                        <h1 className="login-title">Welcome Back</h1>
                        <p className="login-subtitle">Sign in to access your sales dashboard</p>
                        <button className="login-btn" onClick={onLogin}>
                            Sign in with GitHub
                        </button>
                    </div>
                </div>
            );
        };

        // ==================== ERROR BOUNDARY ====================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('❌ Error caught by boundary:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="login-container">
                            <div className="login-card" style={{ textAlign: 'center', padding: '40px' }}>
                                <h2 style={{ color: 'var(--povio-danger)', marginBottom: '16px' }}>
                                    ⚠️ Something went wrong
                                </h2>
                                <p style={{ color: 'var(--povio-gray-700)', marginBottom: '24px' }}>
                                    An error occurred while loading the application.
                                </p>
                                <button
                                    className="btn btn-primary"
                                    onClick={() => window.location.reload()}
                                >
                                    Reload Page
                                </button>
                                {this.state.error && (
                                    <details style={{ marginTop: '24px', textAlign: 'left' }}>
                                        <summary style={{ cursor: 'pointer', color: 'var(--povio-gray-600)' }}>
                                            Error details
                                        </summary>
                                        <pre style={{
                                            marginTop: '8px',
                                            padding: '12px',
                                            background: 'var(--povio-gray-100)',
                                            borderRadius: '4px',
                                            fontSize: '12px',
                                            overflow: 'auto'
                                        }}>
                                            {this.state.error.toString()}
                                        </pre>
                                    </details>
                                )}
                            </div>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // ==================== MAIN APP ====================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            // Initialize Supabase Auth
            useEffect(() => {
                const initAuth = async () => {
                    // Check if user is authenticated
                    const { data: { session } } = await supabaseClient.auth.getSession();

                    if (session?.user) {
                        setUser(session.user);
                    }

                    setLoading(false);
                };

                initAuth();

                // Listen for auth changes
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });

                return () => subscription.unsubscribe();
            }, []);

            const handleLogin = async () => {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'github',
                    options: {
                        redirectTo: window.location.href.split('#')[0].split('?')[0]
                    }
                });

                if (error) {
                    console.error('Error logging in:', error);
                }
            };

            const handleLogout = async () => {
                await supabaseClient.auth.signOut();
            };

            // Show loading state
            if (loading) {
                return <div className="login-container"><div className="login-card"><p>Loading...</p></div></div>;
            }

            // Show login screen if not authenticated
            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            // Main authenticated app
            return <AuthenticatedApp user={user} onLogout={handleLogout} />;
        };

        const AuthenticatedApp = ({ user, onLogout }) => {
            const [view, setView] = useState('goals');
            const [goals, setGoals] = useState([]);
            const [whales, setWhales] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch goals from database
            const fetchGoals = async () => {
                const { data, error } = await supabaseClient
                    .from('goals')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('id', { ascending: true });

                if (error) {
                    console.error('Error fetching goals:', error);
                    return;
                }

                // Map database fields to component fields
                const mappedGoals = (data || []).map(goal => ({
                    ...goal,
                    bucket: goal.category,  // RoadmapView expects 'bucket'
                    successMetric: goal.target,  // Some components expect 'successMetric'
                    owner: goal.owner || 'Vid Lešnik'  // Default owner if not set
                }));

                setGoals(mappedGoals);
            };

            // Fetch whales from database
            const fetchWhales = async () => {
                const { data, error } = await supabaseClient
                    .from('whales')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('id', { ascending: true });

                if (error) {
                    console.error('Error fetching whales:', error);
                    return;
                }

                // Map database fields (snake_case) to component fields (camelCase)
                const mappedWhales = (data || []).map(whale => ({
                    ...whale,
                    contractEnd: whale.contract_end,
                    accountManager: whale.account_manager,
                    lastQBR: whale.last_qbr,
                    nextQBR: whale.next_qbr,
                    churnRisk: whale.churn_risk
                }));

                setWhales(mappedWhales);
            };

            // Migrate localStorage data to database if needed
            const migrateData = async () => {
                // Check if database has data
                const { data: existingGoals } = await supabaseClient
                    .from('goals')
                    .select('id')
                    .eq('user_id', user.id)
                    .limit(1);

                // If database is empty, try to migrate from localStorage or use initial data
                if (!existingGoals || existingGoals.length === 0) {
                    let goalsToMigrate = initialGoals;
                    let whalesToMigrate = initialWhales;

                    // Check localStorage first
                    const savedGoals = localStorage.getItem('povio-goals-2026-combined');
                    const savedWhales = localStorage.getItem('povio-whales-2026');

                    if (savedGoals) {
                        goalsToMigrate = JSON.parse(savedGoals);
                    }
                    if (savedWhales) {
                        whalesToMigrate = JSON.parse(savedWhales);
                    }

                    // Insert goals
                    for (const goal of goalsToMigrate) {
                        await supabaseClient.from('goals').insert([{
                            user_id: user.id,
                            number: goal.number,
                            title: goal.title,
                            target: goal.target || goal.successMetric,
                            deadline: goal.deadline,
                            category: goal.bucket || goal.category,
                            milestones: goal.milestones || []
                        }]);
                    }

                    // Insert whales
                    for (const whale of whalesToMigrate) {
                        await supabaseClient.from('whales').insert([{
                            user_id: user.id,
                            name: whale.name,
                            industry: whale.industry,
                            health: whale.health,
                            arr: whale.arr,
                            ltv: whale.ltv,
                            contract_end: whale.contractEnd,
                            account_manager: whale.accountManager,
                            last_qbr: whale.lastQBR,
                            next_qbr: whale.nextQBR,
                            expansion: whale.expansion,
                            churn_risk: whale.churnRisk,
                            notes: whale.notes
                        }]);
                    }
                }
            };

            // Initial data load
            useEffect(() => {
                const loadData = async () => {
                    await migrateData();
                    await Promise.all([fetchGoals(), fetchWhales()]);
                    setLoading(false);
                };

                if (user) {
                    loadData();
                }
            }, [user]);

            // Update goal in database
            const updateGoal = async (updatedGoal) => {
                const { error } = await supabaseClient
                    .from('goals')
                    .update({
                        number: updatedGoal.number,
                        title: updatedGoal.title,
                        target: updatedGoal.target || updatedGoal.successMetric,
                        deadline: updatedGoal.deadline,
                        category: updatedGoal.category || updatedGoal.bucket,
                        milestones: updatedGoal.milestones
                    })
                    .eq('id', updatedGoal.id)
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error updating goal:', error);
                    return;
                }

                // Map updated goal back to component format
                const mappedGoal = {
                    ...updatedGoal,
                    bucket: updatedGoal.category || updatedGoal.bucket,
                    successMetric: updatedGoal.target || updatedGoal.successMetric
                };

                setGoals(goals.map(g => g.id === updatedGoal.id ? mappedGoal : g));
            };

            // Delete goal from database
            const deleteGoal = async (goalId) => {
                const { error } = await supabaseClient
                    .from('goals')
                    .delete()
                    .eq('id', goalId)
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error deleting goal:', error);
                    return;
                }

                setGoals(goals.filter(g => g.id !== goalId));
            };

            // Add new goal to database
            const addGoal = async (newGoal) => {
                const { data, error } = await supabaseClient
                    .from('goals')
                    .insert([{
                        user_id: user.id,
                        number: newGoal.number || `Goal ${goals.length + 1}`,
                        title: newGoal.title,
                        target: newGoal.target || newGoal.successMetric,
                        deadline: newGoal.deadline,
                        category: newGoal.category || newGoal.bucket,
                        milestones: newGoal.milestones || []
                    }])
                    .select()
                    .single();

                if (error) {
                    console.error('Error adding goal:', error);
                    return;
                }

                // Map new goal to component format
                const mappedGoal = {
                    ...data,
                    bucket: data.category,
                    successMetric: data.target,
                    owner: data.owner || 'Vid Lešník'
                };

                setGoals([...goals, mappedGoal]);
            };

            // Update whales in database
            const updateWhales = async (updatedWhales) => {
                // This is called when WhaleView updates the whales array
                // We'll need to update each whale individually
                for (const whale of updatedWhales) {
                    if (whale.id) {
                        // Update existing whale
                        await supabaseClient
                            .from('whales')
                            .update({
                                name: whale.name,
                                industry: whale.industry,
                                health: whale.health,
                                arr: whale.arr,
                                ltv: whale.ltv,
                                contract_end: whale.contractEnd,
                                account_manager: whale.accountManager,
                                last_qbr: whale.lastQBR,
                                next_qbr: whale.nextQBR,
                                expansion: whale.expansion,
                                churn_risk: whale.churnRisk,
                                notes: whale.notes,
                                contacts: whale.contacts || [],
                                referrals_count: whale.referrals_count || 0,
                                referrals_revenue: whale.referrals_revenue || 0
                            })
                            .eq('id', whale.id)
                            .eq('user_id', user.id);
                    }
                }
                setWhales(updatedWhales);
            };

            if (loading) {
                return <div className="login-container"><div className="login-card"><p>Loading your data...</p></div></div>;
            }
            const allMilestones = goals.flatMap(g => g.milestones);
            const totalMilestones = allMilestones.length;
            const completedMilestones = allMilestones.filter(m => m.status === 'complete').length;
            const overallProgress = totalMilestones > 0 ? Math.round((completedMilestones / totalMilestones) * 100) : 0;
            const goalStatuses = goals.map(g => calculateGoalStatus(g.milestones));
            const goalsOnTrack = goalStatuses.filter(s => s === 'on-track' || s === 'complete').length;
            const goalsAtRisk = goalStatuses.filter(s => s === 'at-risk' || s === 'behind').length;

            return (
                <div className="app-container">
                    <div className="header">
                        <div className="header-brand"><PovioLogo /><div className="header-divider" /><div className="header-title"><h1>{view === 'whales' ? 'Whale Protection Programme' : '2026 Sales Goals'}</h1><span className="header-subtitle">Vid Lešnik • Head of Sales & Partnerships</span></div></div>
                        <div className="header-actions"><div className="view-toggle"><button className={`view-btn ${view === 'goals' ? 'active' : ''}`} onClick={() => setView('goals')}>Goals</button><button className={`view-btn ${view === 'roadmap' ? 'active' : ''}`} onClick={() => setView('roadmap')}>Roadmap</button><button className={`view-btn ${view === 'whales' ? 'active' : ''}`} onClick={() => setView('whales')}>Whales</button></div><button className="logout-btn" onClick={onLogout}>Sign Out</button></div>
                    </div>
                    {view !== 'whales' && (
                        <div className="stats-bar">
                            <div className="stat-card"><h3>Overall Progress</h3><div className="value blue">{overallProgress}%</div></div>
                            <div className="stat-card"><h3>Milestones Complete</h3><div className="value">{completedMilestones}/{totalMilestones}</div></div>
                            <div className="stat-card"><h3>Goals On Track</h3><div className="value green">{goalsOnTrack}</div></div>
                            <div className="stat-card"><h3>Goals At Risk</h3><div className="value red">{goalsAtRisk}</div></div>
                        </div>
                    )}
                    {view === 'goals' && <GoalsView goals={goals} onUpdate={updateGoal} onDelete={deleteGoal} onAdd={addGoal} />}
                    {view === 'roadmap' && <RoadmapView goals={goals} />}
                    {view === 'whales' && <WhaleView whales={whales} onUpdate={updateWhales} user={user} />}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>

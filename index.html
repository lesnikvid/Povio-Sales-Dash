                            redirectTo: window.location.href.split('#')[0].split('?')[0]
                        }
                    });

                    if (error) {
                        console.error('Error logging in:', error);
                        setLoginError('Sign in failed: ' + error.message);
                    }
                } catch (err) {
                    console.error('Error logging in:', err);
                    setLoginError('Unable to reach the authentication server. Please check your connection.');
                }
            };

            const handleLoginGoogle = async () => {
                setLoginError(null);
                if (!navigator.onLine) {
                    setLoginError('No internet connection. Please check your network and try again.');
                    return;
                }
                try {
                    const { error } = await supabaseClient.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.href.split('#')[0].split('?')[0],
                            queryParams: { hd: 'povio.com', prompt: 'select_account' }
                        }
                    });
                    if (error) {
                        console.error('Error logging in (Google):', error);
                        setLoginError('Google sign in failed: ' + error.message);
                    }
                } catch (err) {
                    console.error('Error logging in (Google):', err);
                    setLoginError('Unable to reach the authentication server. Please check your connection.');
                }
            };

            const handleLogout = async () => {
                await supabaseClient.auth.signOut();
                setCurrentPovioUser(null);
            };

            // Show loading state
            if (loading) {
                return <div className="login-container"><div className="login-card"><p>Loading...</p></div></div>;
            }

            // Show login screen if not authenticated OR if email isn't on the team list
            if (!user || !currentPovioUser) {
                return <LoginScreen onLogin={handleLogin} onLoginGoogle={handleLoginGoogle} onClearSession={handleClearSession} error={loginError} />;
            }

            // Main authenticated app
            return <AuthenticatedApp user={user} currentPovioUser={currentPovioUser} onLogout={handleLogout} />;
        };

        const AuthenticatedApp = ({ user, currentPovioUser, onLogout }) => {
            const isAdmin = currentPovioUser?.role === 'admin';
            // Reps see only Accounts + Calendar. Admins see everything.
            const VIEWS = isAdmin
                ? ['dashboard', 'goals', 'roadmap', 'whales', 'calendar', 'team', 'my-week', 'process', 'admin']
                : ['whales', 'calendar', 'my-week'];
            const DEFAULT_VIEW = isAdmin ? 'dashboard' : 'whales';
            const getViewFromHash = () => {
                const h = window.location.hash.replace('#', '').split('/')[0];
                return VIEWS.includes(h) ? h : DEFAULT_VIEW;
            };

            const [view, setView] = useState(getViewFromHash);
            const [allowedUsers, setAllowedUsers] = useState([]);  // directory (Vid + all AMs)

            // Theme: 'blue' (default Povio palette) | 'pink' (baby-pink palette).
            // Per-device, stored in localStorage('povio-theme'). The pre-React inline
            // script in <head> applies the class on first paint to avoid a flash.
            const [theme, setTheme] = useState(() => {
                try {
                    return localStorage.getItem('povio-theme') === 'pink' ? 'pink' : 'blue';
                } catch (e) { return 'blue'; }
            });
            useEffect(() => {
                document.body.classList.toggle('theme-pink', theme === 'pink');
                try { localStorage.setItem('povio-theme', theme); } catch (e) {}
            }, [theme]);
            const toggleTheme = () => setTheme(t => t === 'pink' ? 'blue' : 'pink');

            // Keep URL hash in sync when view changes.
            // Skip when the hash contains an OAuth callback fragment (access_token=...,
            // error=...) — those need to be left alone until Supabase parses them.
            useEffect(() => {
                const h = window.location.hash.replace('#', '');
                if (h.startsWith('access_token=') || h.startsWith('error=') || h.includes('&access_token=')) return;
                window.location.hash = view;
            }, [view]);

            // Respect browser back / forward + redirect reps trying to hit admin routes
            useEffect(() => {
                const onHash = () => {
                    const requested = window.location.hash.replace('#', '').split('/')[0];
                    if (!VIEWS.includes(requested) && requested) {
                        // Rep tried to hit an admin route — redirect quietly
                        window.location.hash = DEFAULT_VIEW;
                        return;
                    }
                    setView(getViewFromHash());
                };
                window.addEventListener('hashchange', onHash);
                return () => window.removeEventListener('hashchange', onHash);
            }, [VIEWS.join(',')]);

            // Fetch the team directory once (used for owner-name lookups and avatars)
            useEffect(() => {
                supabaseClient
                    .from('allowed_users')
                    .select('email, role, povio_id, name, initials, color')
                    .order('role', { ascending: true })
                    .then(({ data }) => setAllowedUsers(data || []));
            }, []);
            const [goals, setGoals] = useState([]);
            const [whales, setWhales] = useState([]);
            const [teamData, setTeamData] = useState(null);
            const [calendarEvents, setCalendarEvents] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch goals from database
            const fetchGoals = async () => {
                const { data, error } = await supabaseClient
                    .from('goals')
                    .select('*')
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error fetching goals:', error);
                    return;
                }

                // Deduplicate by `number` field, keeping the most recently created row
                const seen = new Map();
                for (const goal of (data || [])) {
                    const key = goal.number;
                    const existing = seen.get(key);
                    if (!existing || goal.id > existing.id) {
                        seen.set(key, goal);
                    }
                }
                const unique = Array.from(seen.values());

                // Sort numerically by the digit in "Goal N"
                unique.sort((a, b) => {
                    const numA = parseInt((a.number || '').replace(/\D/g, ''), 10) || 0;
                    const numB = parseInt((b.number || '').replace(/\D/g, ''), 10) || 0;
                    return numA - numB;
                });

                // Map database fields to component fields
                const mappedGoals = unique.map(goal => ({
                    ...goal,
                    bucket: goal.category,  // RoadmapView expects 'bucket'
                    successMetric: goal.target,  // Some components expect 'successMetric'
                    owner: goal.owner || 'Vid Lešnik'  // Default owner if not set
                }));

                setGoals(mappedGoals);
            };

            // Fetch ALL whales (collaborative — RLS handles access control)
            // Post-merge: no longer user_id-scoped. Reps see all imported accounts;
            // Vid sees everything including his original 5–6 key whales.
            const fetchWhales = async () => {
                const { data, error } = await supabaseClient
                    .from('whales')
                    .select('*')
                    .order('is_key_account', { ascending: false })
                    .order('arr', { ascending: false, nullsFirst: false })
                    .order('id', { ascending: true });

                if (error) {
                    console.error('Error fetching whales:', error);
                    return;
                }

                // Map database fields (snake_case) to component fields (camelCase)
                const mappedWhales = (data || []).map(whale => ({
                    ...whale,
                    contractEnd: whale.contract_end,
                    accountManager: whale.account_manager,
                    lastQBR: whale.last_qbr,
                    nextQBR: whale.next_qbr,
                    churnRisk: whale.churn_risk,
                    ownerPovioId: whale.owner_povio_id,
                    isKeyAccount: whale.is_key_account
                }));

                setWhales(mappedWhales);
            };

            // Fetch team data from database; auto-seed with defaults if no row exists
            const fetchTeam = async () => {
                const { data, error } = await supabaseClient
                    .from('team_data')
                    .select('*')
                    .eq('user_id', user.id)
                    .maybeSingle();

                if (error) {
                    console.error('Error fetching team:', error);
                    setTeamData({ structure: DEFAULT_TEAM_STRUCTURE });
                    return;
                }

                if (!data) {
                    // First-time user — seed with default structure
                    const { data: seeded, error: seedError } = await supabaseClient
                        .from('team_data')
                        .insert([{ user_id: user.id, structure: DEFAULT_TEAM_STRUCTURE }])
                        .select()
                        .single();
                    if (seedError) {
                        console.error('Error seeding team:', seedError);
                        setTeamData({ structure: DEFAULT_TEAM_STRUCTURE });
                    } else {
                        setTeamData(seeded);
                    }
                    return;
                }

                setTeamData(data);
            };

            // Save an updated team structure to DB
            const updateTeam = async (newStructure) => {
                // Optimistic update for snappy UI
                setTeamData(prev => ({ ...(prev || {}), structure: newStructure }));
                const { error } = await supabaseClient
                    .from('team_data')
                    .update({ structure: newStructure })
                    .eq('user_id', user.id);
                if (error) {
                    console.error('Error updating team:', error);
                    // Refetch to revert on error
                    fetchTeam();
                }
            };

            // Fetch calendar events
            const fetchCalendarEvents = async () => {
                const { data, error } = await supabaseClient
                    .from('calendar_events')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('start_date', { ascending: true });
                if (error) {
                    console.error('Error fetching calendar events:', error);
                    return;
                }
                setCalendarEvents(data || []);
            };

            // Update calendar events in DB (replaces entire array)
            const updateCalendarEvents = async (newEvents) => {
                // Optimistic update
                setCalendarEvents(newEvents);

                // Find added, updated, deleted
                const oldIds = new Set(calendarEvents.map(e => e.id));
                const newIds = new Set(newEvents.map(e => e.id));

                const toAdd = newEvents.filter(e => !oldIds.has(e.id));
                const toUpdate = newEvents.filter(e => oldIds.has(e.id));
                const toDelete = calendarEvents.filter(e => !newIds.has(e.id));

                try {
                    // Insert new events
                    for (const evt of toAdd) {
                        const { error } = await supabaseClient
                            .from('calendar_events')
                            .insert([{ ...evt, user_id: user.id }]);
                        if (error) console.error('Error adding event:', error);
                    }

                    // Update existing events
                    for (const evt of toUpdate) {
                        const { error } = await supabaseClient
                            .from('calendar_events')
                            .update({
                                member_id: evt.member_id,
                                member_name: evt.member_name,
                                event_type: evt.event_type,
                                title: evt.title,
                                start_date: evt.start_date,
                                end_date: evt.end_date,
                                notes: evt.notes
                            })
                            .eq('id', evt.id)
                            .eq('user_id', user.id);
                        if (error) console.error('Error updating event:', error);
                    }

                    // Delete removed events
                    for (const evt of toDelete) {
                        const { error } = await supabaseClient
                            .from('calendar_events')
                            .delete()
                            .eq('id', evt.id)
                            .eq('user_id', user.id);
                        if (error) console.error('Error deleting event:', error);
                    }
                } catch (err) {
                    console.error('Error updating calendar events:', err);
                    // Refetch on error
                    fetchCalendarEvents();
                }
            };

            // Initial data load.
            // Use allSettled so one failure (e.g. RLS denial on team_data for a rep)
            // never leaves the "Loading your data..." screen stuck. Reps don't have
            // access to goals / team_data / admin-only data anyway, so skip those.
            useEffect(() => {
                let cancelled = false;
                const loadData = async () => {
                    try {
                        const tasks = [fetchWhales(), fetchCalendarEvents()];
                        if (isAdmin) tasks.push(fetchGoals(), fetchTeam());
                        await Promise.allSettled(tasks);
                    } catch (err) {
                        // Should never reach here with allSettled, but defense-in-depth
                        console.error('loadData unexpected error:', err);
                    } finally {
                        if (!cancelled) setLoading(false);
                    }
                };

                if (user) loadData();
                return () => { cancelled = true; };
            }, [user, isAdmin]);

            // Update goal in database
            const updateGoal = async (updatedGoal) => {
                const { error } = await supabaseClient
                    .from('goals')
                    .update({
                        number: updatedGoal.number,
                        title: updatedGoal.title,
                        target: updatedGoal.target || updatedGoal.successMetric,
                        deadline: updatedGoal.deadline,
                        category: updatedGoal.category || updatedGoal.bucket,
                        milestones: updatedGoal.milestones
                    })
                    .eq('id', updatedGoal.id)
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error updating goal:', error);
                    return;
                }

                // Map updated goal back to component format
                const mappedGoal = {
                    ...updatedGoal,
                    bucket: updatedGoal.category || updatedGoal.bucket,
                    successMetric: updatedGoal.target || updatedGoal.successMetric
                };

                setGoals(goals.map(g => g.id === updatedGoal.id ? mappedGoal : g));
            };

            // Delete goal from database
            const deleteGoal = async (goalId) => {
                const { error } = await supabaseClient
                    .from('goals')
                    .delete()
                    .eq('id', goalId)
                    .eq('user_id', user.id);

                if (error) {
                    console.error('Error deleting goal:', error);
                    return;
                }

                setGoals(goals.filter(g => g.id !== goalId));
            };

            // Add new goal to database
            const addGoal = async (newGoal) => {
                const { data, error } = await supabaseClient
                    .from('goals')
                    .insert([{
                        user_id: user.id,
                        number: newGoal.number || `Goal ${goals.length + 1}`,
                        title: newGoal.title,
                        target: newGoal.target || newGoal.successMetric,
                        deadline: newGoal.deadline,
                        category: newGoal.category || newGoal.bucket,
                        milestones: newGoal.milestones || []
                    }])
                    .select()
                    .single();

                if (error) {
                    console.error('Error adding goal:', error);
                    return;
                }

                // Map new goal to component format
                const mappedGoal = {
                    ...data,
                    bucket: data.category,
                    successMetric: data.target,
                    owner: data.owner || 'Vid Lešník'
                };

                setGoals([...goals, mappedGoal]);
            };

            // Update whales in database — collaborative (any AM can edit any account).
            // RLS gates access; migration 004 added BEFORE/AFTER UPDATE triggers that:
            //   - override updated_by_povio_id with the caller's authoritative id
            //   - block reps from changing owner_povio_id / is_key_account
            //   - auto-write an `activities` row diffing the watched columns
            // So this function no longer logs to `activities` directly — the trigger
            // is the source of truth and cannot be bypassed by DevTools.
            //
            // Note: the updated_by_povio_id field below is decorative — the server
            // trigger overwrites it. Kept for clarity / debuggability.
            const updateWhales = async (updatedWhales) => {
                for (const whale of updatedWhales) {
                    if (!whale.id) continue;
                    const next = {
                        name: whale.name,
                        industry: whale.industry,
                        health: whale.health,
                        arr: whale.arr,
                        ltv: whale.ltv,
                        contract_end: whale.contractEnd,
                        account_manager: whale.accountManager,
                        last_qbr: whale.lastQBR,
                        next_qbr: whale.nextQBR,
                        expansion: whale.expansion,
                        churn_risk: whale.churnRisk,
                        notes: whale.notes,
                        contacts: whale.contacts || [],
                        referrals_count: whale.referrals_count || 0,
                        referrals_revenue: whale.referrals_revenue || 0
                    };
                    const { error } = await supabaseClient
                        .from('whales')
                        .update(next)
                        .eq('id', whale.id);
                    if (error) console.error('updateWhale error', error);
                }
                setWhales(updatedWhales);
            };

            if (loading) {
                return <div className="login-container"><div className="login-card"><p>Loading your data...</p></div></div>;
            }
            const allMilestones = goals.flatMap(g => g.milestones);
            const totalMilestones = allMilestones.length;
            const completedMilestones = allMilestones.filter(m => m.status === 'complete').length;
            const overallProgress = totalMilestones > 0 ? Math.round((completedMilestones / totalMilestones) * 100) : 0;
            const goalStatuses = goals.map(g => calculateGoalStatus(g.milestones));
            const goalsOnTrack = goalStatuses.filter(s => s === 'on-track' || s === 'complete').length;
            const goalsAtRisk = goalStatuses.filter(s => s === 'at-risk' || s === 'behind').length;

            const TITLES = {
                dashboard: 'Sales Command Center',
                goals:     '2026 Sales Goals',
                roadmap:   'Roadmap',
                whales:    'Accounts',
                calendar:  'Team Calendar',
                team:      'Sales Team Structure',
                'my-week': 'My Tasks',
                process:   'Process & Playbook',
                admin:     'Admin'
            };
            const NAV_ITEMS = [
                { id: 'dashboard', label: 'Dashboard', icon: '◇', adminOnly: true,  mobile: true  },
                { id: 'goals',     label: 'Goals',     icon: '◎', adminOnly: true,  mobile: false },
                { id: 'roadmap',   label: 'Roadmap',   icon: '↗', adminOnly: true,  mobile: false },
                { id: 'whales',    label: 'Accounts',  icon: '◧', adminOnly: false, mobile: true  },
                { id: 'calendar',  label: 'Calendar',  icon: '☐', adminOnly: false, mobile: true  },
                { id: 'team',      label: 'Team',      icon: '◈', adminOnly: true,  mobile: false },
                { id: 'my-week',   label: 'My Tasks',  icon: '✓', adminOnly: false, mobile: true  },
                { id: 'process',   label: 'Process',   icon: '→', adminOnly: true,  mobile: false },
                { id: 'admin',     label: 'Admin',     icon: '⚙', adminOnly: true,  mobile: false },
            ];
            const visibleNav   = NAV_ITEMS.filter(n => !n.adminOnly || isAdmin);
            const mobileNavBtns = visibleNav.filter(n => n.mobile);

            const showGoalsStats = isAdmin && (view === 'goals' || view === 'roadmap');

            return (
                <div className="app-container">
                    <div className="header">
                        <div className="header-brand">
                            <PovioLogo />
                            <div className="header-divider" />
                            <div className="header-title">
                                <h1>{TITLES[view] || 'Povio Sales'}</h1>
                                <span className="header-subtitle">
                                    {currentPovioUser?.name || user.email}
                                    {' · '}<span className={'role-chip ' + (isAdmin ? 'admin' : 'rep')}>{isAdmin ? 'Admin' : 'AM'}</span>
                                </span>
                            </div>
                        </div>
                        <div className="header-actions">
                            <div className="view-toggle desktop-only">
                                {visibleNav.map(n => (
                                    <button
                                        key={n.id}
                                        className={'view-btn ' + (view === n.id ? 'active' : '')}
                                        onClick={() => setView(n.id)}
                                    >{n.label}</button>
                                ))}
                            </div>
                            <button
                                className="theme-toggle"
                                onClick={toggleTheme}
                                title={theme === 'pink' ? 'Switch to Povio blue' : 'Switch to baby pink'}
                            >
                                <span className="theme-swatch" />
                                <span className="theme-toggle-label">
                                    {theme === 'pink' ? 'Pink' : 'Blue'}
                                </span>
                            </button>
                            <button className="logout-btn" onClick={onLogout}>Sign Out</button>
                        </div>
                    </div>

                    {showGoalsStats && (
                        <div className="stats-bar">
                            <div className="stat-card"><h3>Overall Progress</h3><div className="value blue">{overallProgress}%</div></div>
                            <div className="stat-card"><h3>Milestones Complete</h3><div className="value">{completedMilestones}/{totalMilestones}</div></div>
                            <div className="stat-card"><h3>Goals On Track</h3><div className="value green">{goalsOnTrack}</div></div>
                            <div className="stat-card"><h3>Goals At Risk</h3><div className="value red">{goalsAtRisk}</div></div>
                        </div>
                    )}

                    {isAdmin && view === 'dashboard' && <DashboardView whales={whales} goals={goals} allowedUsers={allowedUsers} setView={setView} />}
                    {isAdmin && view === 'goals'     && <GoalsView goals={goals} onUpdate={updateGoal} onDelete={deleteGoal} onAdd={addGoal} />}
                    {isAdmin && view === 'roadmap'   && <RoadmapView goals={goals} />}
                    {            view === 'whales'   && <AccountsView whales={whales} allowedUsers={allowedUsers} onUpdate={updateWhales} onWhalesRefresh={fetchWhales} currentPovioUser={currentPovioUser} user={user} />}
                    {            view === 'calendar' && <CalendarView teamData={teamData} events={calendarEvents} onUpdateEvents={updateCalendarEvents} user={user} readOnly={!isAdmin} />}
                    {isAdmin && view === 'team'      && <TeamView teamData={teamData} onUpdate={updateTeam} user={user} />}
                    {            view === 'my-week'   && <MyWeekView whales={whales} user={user} currentPovioUser={currentPovioUser} isAdmin={isAdmin} />}
                    {isAdmin && view === 'process'   && <ProcessView />}
                    {isAdmin && view === 'admin'     && <AdminView whales={whales} allowedUsers={allowedUsers} user={user} currentPovioUser={currentPovioUser} onWhalesRefresh={fetchWhales} />}

                    {/* Mobile bottom nav — adapts to role */}
                    <nav className="mobile-nav">
                        <div className={'mobile-nav-grid cols-' + Math.min(4, mobileNavBtns.length)}>
                            {mobileNavBtns.map(n => (
                                <button
                                    key={n.id}
                                    className={'mobile-nav-btn ' + (view === n.id ? 'active' : '')}
                                    onClick={() => setView(n.id)}
                                >
                                    <span className="nav-icon">{n.icon}</span>
                                    {n.label}
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>

                                    <div className="acct-name-cell">
                                        {w.is_key_account && <span style={{ fontSize: 14 }}>🐋</span>}
                                        <div style={{ minWidth: 0 }}>
                                            <div className="acct-name">{w.name}</div>
                                            <div className="acct-sub">{w.industry || '—'} · {(w.engagement_type || 'team_aug').replace('_', ' ')}</div>
                                        </div>
                                    </div>
                                    <div className="acct-hide-mobile">
                                        <div className="acct-cell-label">ARR</div>
                                        <div className="acct-cell-value arr">{fmtARR(w.arr)}</div>
                                        {w.fte > 0 && <div style={{ fontSize: 10, color: 'var(--povio-gray-500)', fontWeight: 600 }}>{parseFloat(w.fte).toFixed(2)} FTE</div>}
                                    </div>
                                    <div className="acct-hide-mobile">
                                        <div className="acct-cell-label">Owner</div>
                                        {owner ? (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                                                <div style={{ width: 18, height: 18, borderRadius: '50%', background: owner.color || '#A3A3A3', color: 'white', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 700 }}>{owner.initials}</div>
                                                <span style={{ fontSize: 12, fontWeight: 600 }}>{owner.name}</span>
                                            </div>
                                        ) : <span style={{ fontSize: 12, color: 'var(--povio-gray-400)' }}>—</span>}
                                    </div>
                                    <div className="acct-hide-mobile">
                                        <span className={'tag tag-' + (healthClass === 'healthy' ? 'green' : healthClass === 'at_risk' ? 'yellow' : 'red')}>{(w.health || 'healthy').replace('_', ' ')}</span>
                                    </div>
                                    <div className="acct-hide-mobile">
                                        <div className="acct-cell-label">Expansion</div>
                                        <div style={{ fontSize: 12, fontWeight: 600, marginTop: 2 }}>{w.expansion_potential || w.expansion || '—'}</div>
                                    </div>
                                    <div className="acct-hide-mobile" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: 12, color: 'var(--povio-gray-500)', fontStyle: 'italic' }}>{w.last_note || w.notes || ''}</div>
                                    <div className="acct-hide-mobile" style={{ fontSize: 12, color: 'var(--povio-gray-500)' }}>{relTime(w.updated_at || w.last_touch_at)}</div>
                                    <div className={'acct-expand-icon ' + (isSelected ? 'selected' : '')}>›</div>
                                </div>
                            </div>
                        );
                    })}

                    {/* ===== Slide-out detail sidebar ===== */}
                    {/* Anchored to the right edge of the viewport. Renders the
                        same Overview / Edit / QBR content the inline accordion
                        used to show, but in a dedicated panel so the list stays
                        visible behind it. The IIFE scopes `w` → selectedWhale so
                        the existing inline JSX below can be reused unchanged. */}
                    {selectedWhale && (() => {
                        const w = selectedWhale;
                        const owner = ownersById.get(w.owner_povio_id);
                        const healthClass = ['healthy', 'at_risk', 'critical'].includes((w.health || '').toLowerCase()) ? (w.health || '').toLowerCase() : 'healthy';
                        return (
                            <div className="acct-sidebar open" key={w.id} role="dialog" aria-modal="false" aria-labelledby="acct-sb-title">
                                <div className="acct-sidebar-header">
                                    <button className="acct-sidebar-close" onClick={() => setSelectedId(null)} aria-label="Close detail panel" title="Close (Esc)">×</button>
                                    <div className="acct-sidebar-title" id="acct-sb-title">
                                        {w.is_key_account && <span title="Key account">🐋</span>}
                                        <span>{w.name}</span>
                                    </div>
                                    <div className="acct-sidebar-sub">
                                        {w.industry || '—'} · {(w.engagement_type || 'team_aug').replace('_', ' ')}
                                    </div>
                                    <div className="acct-sidebar-meta">
                                        <div className="acct-sidebar-meta-item">
                                            <span className="acct-sidebar-meta-label">ARR</span>
                                            <span className="acct-sidebar-meta-value arr">{fmtARR(w.arr)}</span>
                                        </div>
                                        {w.fte > 0 && (
                                            <div className="acct-sidebar-meta-item">
                                                <span className="acct-sidebar-meta-label">FTE</span>
                                                <span className="acct-sidebar-meta-value">{parseFloat(w.fte).toFixed(2)}</span>
                                            </div>
                                        )}
                                        <div className="acct-sidebar-meta-item">
                                            <span className="acct-sidebar-meta-label">Owner</span>
                                            <span className="acct-sidebar-meta-value" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                                {owner ? (
                                                    <>
                                                        <span style={{ width: 16, height: 16, borderRadius: '50%', background: owner.color || '#A3A3A3', color: 'white', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 700 }}>{owner.initials}</span>
                                                        {owner.name}
                                                    </>
                                                ) : <span style={{ color: 'var(--povio-gray-400)' }}>— Unassigned —</span>}
                                            </span>
                                        </div>
                                        <div className="acct-sidebar-meta-item">
                                            <span className="acct-sidebar-meta-label">Health</span>
                                            <span className={'tag tag-' + (healthClass === 'healthy' ? 'green' : healthClass === 'at_risk' ? 'yellow' : 'red')} style={{ fontSize: 11 }}>{(w.health || 'healthy').replace('_', ' ')}</span>
                                        </div>
                                        <div className="acct-sidebar-meta-item">
                                            <span className="acct-sidebar-meta-label">Updated</span>
                                            <span className="acct-sidebar-meta-value" style={{ fontWeight: 600, color: 'var(--povio-gray-700)' }}>{relTime(w.updated_at || w.last_touch_at) || '—'}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="acct-sidebar-tabs">
                                    <button className={'acct-sidebar-tab ' + (activeTab === 'overview' ? 'active' : '')} onClick={() => setActiveTab('overview')}>Overview</button>

                                                    <div className="detail-grid">

                                                            <h4>Engagement</h4>
                                                            <div className="detail-row"><span className="detail-label">Type</span>

                                                                    onSave={v => saveField(w.id, 'engagement_type', v)}
                                                                    options={[{value:'team_aug',label:'team aug'},{value:'agency',label:'agency'},{value:'hybrid',label:'hybrid'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">FTE</span>
                                                                <InlineEdit value={w.fte || 0} display={w.fte > 0 ? parseFloat(w.fte).toFixed(2) : '—'}
                                                                    onSave={v => saveField(w.id, 'fte', v)} type="number" />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Hours/week</span>
                                                                <InlineEdit value={w.engagement_hours_week || ''}
                                                                    onSave={v => saveField(w.id, 'engagement_hours_week', v)} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Industry</span>
                                                                <InlineEdit value={w.industry || ''}
                                                                    onSave={v => saveField(w.id, 'industry', v)} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Contract end</span>
                                                                <InlineEdit value={w.contract_end || ''} display={w.contract_end || '—'}
                                                                    onSave={v => saveField(w.id, 'contract_end', v)} type="date" />
                                                            </div>
                                                        </div>
                                                        <div className="detail-section">
                                                            <h4>Financial</h4>
                                                            <div className="detail-row"><span className="detail-label">ARR (in $K)</span>
                                                                <InlineEdit value={w.arr || 0} display={<span style={{ color: 'var(--povio-blue)', fontWeight: 700 }}>{fmtARR(w.arr)}</span>}
                                                                    onSave={v => saveField(w.id, 'arr', v)} type="number" />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">LTV (in $K)</span>
                                                                <InlineEdit value={w.ltv || 0} display={fmtARR(w.ltv)}
                                                                    onSave={v => saveField(w.id, 'ltv', v)} type="number" />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">2025 forecast</span>
                                                                <InlineEdit value={w.forecast_raw || ''}
                                                                    onSave={v => saveField(w.id, 'forecast_raw', v)}
                                                                    options={[{value:'',label:'—'},{value:'Increasing Revenue',label:'Increasing'},{value:'Same Revenue',label:'Same'},{value:'Decreasing Revenue',label:'Decreasing'},{value:'Not sure',label:'Not sure'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Potential</span>
                                                                <InlineEdit value={w.potential_flag || ''}
                                                                    onSave={v => saveField(w.id, 'potential_flag', v)}
                                                                    options={[{value:'',label:'—'},{value:'Yes',label:'Yes'},{value:'No',label:'No'},{value:"Don't know yet",label:"Don't know yet"}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Referrals #</span>
                                                                <InlineEdit value={w.referrals_count || 0}
                                                                    onSave={v => saveField(w.id, 'referrals_count', v)} type="number" />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Ref. revenue ($K)</span>
                                                                <InlineEdit value={w.referrals_revenue || 0} display={fmtARR(w.referrals_revenue)}
                                                                    onSave={v => saveField(w.id, 'referrals_revenue', v)} type="number" />
                                                            </div>
                                                        </div>
                                                        <div className="detail-section">
                                                            <h4>Status & risk</h4>
                                                            <div className="detail-row"><span className="detail-label">Health</span>
                                                                <InlineEdit value={w.health || 'healthy'} display={<span className={'tag tag-' + (healthClass === 'healthy' ? 'green' : healthClass === 'at_risk' ? 'yellow' : 'red')}>{(w.health || 'healthy').replace('_',' ')}</span>}
                                                                    onSave={v => saveField(w.id, 'health', v)}
                                                                    options={[{value:'healthy',label:'healthy'},{value:'at_risk',label:'at risk'},{value:'critical',label:'critical'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Status</span>
                                                                <InlineEdit value={w.account_status_raw || ''}
                                                                    onSave={v => saveField(w.id, 'account_status_raw', v)}
                                                                    options={[{value:'',label:'—'},{value:'All good',label:'All good'},{value:'Observing',label:'Observing'},{value:'Firefighting',label:'Firefighting'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Expansion</span>
                                                                <InlineEdit value={w.expansion_potential || 'none'} display={w.expansion_potential || w.expansion || '—'}
                                                                    onSave={v => saveField(w.id, 'expansion_potential', v)}
                                                                    options={[{value:'none',label:'none'},{value:'low',label:'low'},{value:'medium',label:'medium'},{value:'high',label:'high'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Churn risk</span>
                                                                <InlineEdit value={w.churn_risk || 'Low'}
                                                                    onSave={v => saveField(w.id, 'churn_risk', v)}
                                                                    options={[{value:'Low',label:'Low'},{value:'Medium',label:'Medium'},{value:'High',label:'High'}]} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Last QBR</span>
                                                                <InlineEdit value={w.last_qbr || ''} display={w.last_qbr || '—'}
                                                                    onSave={v => saveField(w.id, 'last_qbr', v)} type="date" />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Next QBR</span>
                                                                <InlineEdit value={w.next_qbr || ''} display={w.next_qbr || '—'}
                                                                    onSave={v => saveField(w.id, 'next_qbr', v)} type="date" />
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div style={{ marginTop: 22 }}>
                                                        <h4 style={{ fontSize: 11, textTransform: 'uppercase', color: 'var(--povio-gray-500)', marginBottom: 10, letterSpacing: 0.5, fontWeight: 700 }}>Account team</h4>
                                                        <div className="detail-grid" style={{ marginTop: 0 }}>
                                                            <div className="detail-row"><span className="detail-label">Account manager</span>
                                                                <InlineEdit value={w.accountManager || w.account_manager || ''}
                                                                    onSave={v => saveField(w.id, 'account_manager', v)} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Project manager</span>
                                                                <InlineEdit value={w.project_manager || ''}
                                                                    onSave={v => saveField(w.id, 'project_manager', v)} />
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Owner (account)</span>
                                                                {isAdmin ? (
                                                                    <InlineEdit value={w.owner_povio_id || ''} display={owner?.name || <span style={{ color: 'var(--povio-gray-400)' }}>— Unassigned —</span>}
                                                                        onSave={v => saveField(w.id, 'owner_povio_id', v)}
                                                                        options={[{value: '', label: '— Unassigned —'}, ...allowedUsers.filter(u => u.povio_id).map(u => ({value: u.povio_id, label: u.name + (u.role === 'admin' ? ' (admin)' : '')}))]} />
                                                                ) : <span className="detail-value">{owner?.name || '—'}</span>}
                                                            </div>
                                                            <div className="detail-row"><span className="detail-label">Key account 🐋</span>
                                                                {isAdmin ? (
                                                                    <InlineEdit value={w.is_key_account ? 'true' : 'false'} display={w.is_key_account ? '🐋 yes' : 'no'}
                                                                        onSave={v => saveField(w.id, 'is_key_account', v === 'true')}
                                                                        options={[{value:'false',label:'no'},{value:'true',label:'yes 🐋'}]} />
                                                                ) : <span className="detail-value">{w.is_key_account ? '🐋 yes' : 'no'}</span>}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Team members on the project — array editor */}
                                                    <div style={{ marginTop: 22 }}>
                                                        <h4 style={{ fontSize: 11, textTransform: 'uppercase', color: 'var(--povio-gray-500)', marginBottom: 10, letterSpacing: 0.5, fontWeight: 700 }}>Team on the project</h4>
                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' }}>
                                                            {(w.team_members || []).map((t, i) => (
                                                                <span key={i} className={'tag ' + (t === w.project_manager ? 'tag-blue' : '')}
                                                                    style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                                                                    {t === w.project_manager ? 'PM · ' : ''}{t}
                                                                    <span onClick={() => saveJsonArray(w.id, 'team_members', (w.team_members || []).filter((_, j) => j !== i))}
                                                                        style={{ cursor: 'pointer', color: 'var(--povio-gray-400)', marginLeft: 4 }} title="Remove">×</span>
                                                                </span>
                                                            ))}
                                                            <button className="btn btn-secondary btn-small" style={{ padding: '4px 10px', fontSize: 11 }}
                                                                onClick={() => {
                                                                    const name = prompt('Add team member name:');
                                                                    if (name) saveJsonArray(w.id, 'team_members', [...(w.team_members || []), name.trim()]);
                                                                }}>+ Add</button>
                                                        </div>
                                                    </div>

                                                    {/* Notes — freeform text area, editable */}
                                                    <div style={{ marginTop: 22 }}>
                                                        <h4 style={{ fontSize: 11, textTransform: 'uppercase', color: 'var(--povio-gray-500)', marginBottom: 10, letterSpacing: 0.5, fontWeight: 700 }}>Last note (latest update from the AM)</h4>
                                                        <textarea
                                                            defaultValue={w.last_note || ''}
                                                            placeholder="What's the latest with this account? Click out to save."
                                                            onBlur={e => { if (e.target.value !== (w.last_note || '')) saveField(w.id, 'last_note', e.target.value); }}
                                                            style={{ width: '100%', minHeight: 60, padding: 10, background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: 8, fontSize: 13, lineHeight: 1.6, fontFamily: 'inherit' }} />
                                                    </div>
                                                    <div style={{ marginTop: 14 }}>
                                                        <h4 style={{ fontSize: 11, textTransform: 'uppercase', color: 'var(--povio-gray-500)', marginBottom: 10, letterSpacing: 0.5, fontWeight: 700 }}>Notes (long-form)</h4>
                                                        <textarea
                                                            defaultValue={w.notes || ''}
                                                            placeholder="Background, history, anything important. Click out to save."
                                                            onBlur={e => { if (e.target.value !== (w.notes || '')) saveField(w.id, 'notes', e.target.value); }}
                                                            style={{ width: '100%', minHeight: 80, padding: 10, background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: 8, fontSize: 13, lineHeight: 1.6, fontFamily: 'inherit' }} />
                                                    </div>
                                                    <div style={{ marginTop: 14 }}>
                                                        <h4 style={{ fontSize: 11, textTransform: 'uppercase', color: 'var(--povio-gray-500)', marginBottom: 10, letterSpacing: 0.5, fontWeight: 700 }}>Invoicing notes</h4>
                                                        <textarea
                                                            defaultValue={w.invoicing_note || ''}
                                                            placeholder="Who's invoicing, rate cards, payment terms..."
                                                            onBlur={e => { if (e.target.value !== (w.invoicing_note || '')) saveField(w.id, 'invoicing_note', e.target.value); }}
                                                            style={{ width: '100%', minHeight: 50, padding: 10, background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: 8, fontSize: 13, lineHeight: 1.6, fontFamily: 'inherit' }} />
                                                    </div>

                                                    {savingField && (
                                                        <div style={{ marginTop: 14, fontSize: 11, color: 'var(--povio-blue)' }}>Saving…</div>
                                                    )}
                                                </div>
                                            )}
                                            {activeTab === 'qbr' && (
                                                <div>
                                                    {(w.qbr_history && w.qbr_history.length > 0) ? (
                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                                                            {w.qbr_history.map((q, i) => (
                                                                <span key={i} className={'tag ' + (q.status === 'completed' ? 'tag-green' : 'tag-red')}>{q.q} · {q.status === 'completed' ? '✓ done' : '✗ skipped'}</span>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <p style={{ fontSize: 13, color: 'var(--povio-gray-500)' }}>No QBR history imported for this account. Run an in-app QBR via the Edit tab to start tracking.</p>
                                                    )}
                                                </div>
                                            )}
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        // ============== My Week — personal task list (every user has their own) ==============
        const TAG_OPTIONS = [
            { value: '',           label: '— no tag —' },
            { value: 'new_sales',  label: '💰 New Sales' },
            { value: 'am',         label: '🤝 AM' },
            { value: 'outbound',   label: '📤 Outbound' },
            { value: 'management', label: '⭐ Management' },
            { value: 'operations', label: '⚙ Operations' },
        ];
        const tagLabel = (t) => (TAG_OPTIONS.find(o => o.value === t) || {}).label || t;

        const RECUR_OPTIONS = [
            { value: '',         label: 'no repeat' },
            { value: 'daily',    label: '🔁 daily' },
            { value: 'weekly',   label: '🔁 weekly' },
            { value: 'biweekly', label: '🔁 every 2 weeks' },
            { value: 'monthly',  label: '🔁 monthly' },
        ];
        const recurShort = (r) => ({ daily: 'daily', weekly: 'weekly', biweekly: 'every 2 wks', monthly: 'monthly' }[r] || r);

        // Advance a YYYY-MM-DD string by one recurrence interval. Returns YYYY-MM-DD.
        // If no base date, anchors from today.
        const advanceDate = (baseStr, kind) => {
            const d = baseStr ? new Date(baseStr + 'T00:00:00') : new Date();
            d.setHours(0, 0, 0, 0);
            if (kind === 'daily')    d.setDate(d.getDate() + 1);
            if (kind === 'weekly')   d.setDate(d.getDate() + 7);
            if (kind === 'biweekly') d.setDate(d.getDate() + 14);
            if (kind === 'monthly')  d.setMonth(d.getMonth() + 1);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        };

        const MyWeekView = ({ whales, user, currentPovioUser, isAdmin }) => {
            const [todos, setTodos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newTitle, setNewTitle] = useState('');
            const [newDue, setNewDue] = useState('');
            const [newCustomDate, setNewCustomDate] = useState('');
            const [newTag, setNewTag] = useState('');
            const [newRecurrence, setNewRecurrence] = useState('');
            const [showDone, setShowDone] = useState(false);
            const inputRef = useRef(null);

            // Today / tomorrow / next-week date references (YYYY-MM-DD, local time).
            // Treat Monday as the start of a week.
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const isoDate = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            const todayStr = isoDate(today);
            const tomorrowStr = isoDate(new Date(today.getTime() + 86400000));

            // End of this week = upcoming Sunday (or today if today is Sunday).
            // getDay(): 0=Sun, 1=Mon, ..., 6=Sat
            const thisWeekEnd = new Date(today);
            thisWeekEnd.setDate(today.getDate() + ((7 - today.getDay()) % 7));
            const thisWeekEndStr = isoDate(thisWeekEnd);

            // Start of next week = next Monday.
            const nextWeekStart = new Date(today);
            nextWeekStart.setDate(today.getDate() + (((8 - today.getDay()) % 7) || 7));
            const nextWeekStartStr = isoDate(nextWeekStart);
            const nextWeekEnd = new Date(nextWeekStart);
            nextWeekEnd.setDate(nextWeekStart.getDate() + 6);
            const nextWeekEndStr = isoDate(nextWeekEnd);

            const resolveDue = (kind) => {
                if (kind === 'today')     return todayStr;
                if (kind === 'tomorrow')  return tomorrowStr;
                if (kind === 'next_week') return nextWeekStartStr;  // next Monday
                if (kind === 'custom')    return newCustomDate || null;
                return null;
            };

            const fetchTodos = async () => {
                const { data, error } = await supabaseClient
                    .from('todos').select('*')
                    .order('done', { ascending: true })
                    .order('due_date', { ascending: true, nullsFirst: false })
                    .order('created_at', { ascending: false });
                if (error) console.error('fetchTodos error', error);
                setTodos(data || []);
                setLoading(false);
            };
            useEffect(() => { fetchTodos(); }, []);

            const addTodo = async () => {
                if (!newTitle.trim()) return;
                const { error } = await supabaseClient.from('todos').insert({
                    user_id: user.id,
                    title: newTitle.trim(),
                    due_date: resolveDue(newDue),
                    tag: newTag || null,
                    recurrence: newRecurrence || null,
                    source: 'manual'
                });
                if (error) { console.error('addTodo error', error); alert('Could not add task: ' + error.message); return; }
                setNewTitle(''); setNewDue(''); setNewCustomDate(''); setNewTag(''); setNewRecurrence('');
                if (inputRef.current) inputRef.current.focus();
                fetchTodos();
            };

            const updateTodo = async (id, patch) => {
                const { error } = await supabaseClient.from('todos').update(patch).eq('id', id);
                if (error) console.error('updateTodo error', error);
                fetchTodos();
            };

            // Two-phase toggle:
            //   Check (open -> done): set _animating flag so row stays in its
            //     current section AND looks visually checked. Save to DB in
            //     parallel. After 700ms (animation done), refetch — server
            //     truth now has done=true, row resettles into Done section.
            //   Uncheck (done -> open): no animation, just flip and refetch.
            const toggleDone = async (t) => {
                const newDone = !t.done;

                if (newDone) {
                    setTodos(prev => prev.map(x => x.id === t.id
                        ? { ...x, _animating: true } : x));
                    const { error } = await supabaseClient.from('todos').update({
                        done: true,
                        completed_at: new Date().toISOString()
                    }).eq('id', t.id);
                    if (error) {
                        setTodos(prev => prev.map(x => x.id === t.id
                            ? { ...x, _animating: false } : x));
                        alert('Could not save: ' + error.message);
                        return;
                    }
                    // Spawn the next occurrence if this task is recurring.
                    // Inherits title / tag / recurrence; due_date advances by interval.
                    if (t.recurrence) {
                        const nextDate = advanceDate(t.due_date, t.recurrence);
                        const { error: insertErr } = await supabaseClient.from('todos').insert({
                            user_id: user.id,
                            title: t.title,
                            tag: t.tag,
                            due_date: nextDate,
                            recurrence: t.recurrence,
                            source: 'recurring'
                        });
                        if (insertErr) console.error('Could not spawn recurring task', insertErr);
                    }
                    setTimeout(fetchTodos, 700);
                } else {
                    const { error } = await supabaseClient.from('todos').update({
                        done: false,
                        completed_at: null
                    }).eq('id', t.id);
                    if (error) { alert('Could not save: ' + error.message); return; }
                    fetchTodos();
                }
            };

            const deleteTodo = async (id) => {
                if (!confirm('Delete this task?')) return;
                await supabaseClient.from('todos').delete().eq('id', id);
                fetchTodos();
            };

            // Group todos by due date.
            // Today / Tomorrow / This week (rest of this week) / Next week (Mon–Sun) / Later / No date
            const open    = todos.filter(t => !t.done);
            const done    = todos.filter(t =>  t.done);
            const overdue  = open.filter(t => t.due_date && t.due_date <  todayStr);
            const todayL   = open.filter(t => t.due_date === todayStr);
            const tomorrow = open.filter(t => t.due_date === tomorrowStr);
            const thisWeek = open.filter(t => t.due_date && t.due_date >  tomorrowStr && t.due_date <= thisWeekEndStr);
            const nextWeek = open.filter(t => t.due_date && t.due_date >= nextWeekStartStr && t.due_date <= nextWeekEndStr);
            const later    = open.filter(t => t.due_date && t.due_date >  nextWeekEndStr);
            const noDate   = open.filter(t => !t.due_date);

            // (Account-alerts panel removed per Vid request — keep My Tasks focused
            // on todos only. The stale-accounts insight lives elsewhere now.)

            const TaskRow = ({ t }) => {
                const visualDone = t.done || t._animating;
                const isOverdue = !t.done && t.due_date && t.due_date < todayStr;
                const isToday   = !t.done && t.due_date === todayStr;
                const dueClass  = isOverdue ? 'overdue' : (isToday ? 'today' : '');
                return (
                    <div className={'task-row'
                        + (t.done ? ' done' : '')
                        + (t._animating ? ' completing' : '')}>
                        <div onClick={() => toggleDone(t)}
                             className={'task-check' + (visualDone ? ' checked' : '')} />
                        <div className={'task-title-wrap' + (visualDone ? ' done' : '')}>
                            <InlineEdit value={t.title} onSave={v => v && updateTodo(t.id, { title: v })} />
                        </div>
                        <div className="task-row-chips">
                            <InlineEdit value={t.due_date || ''} type="date"
                                display={t.due_date
                                    ? <span className={'task-due ' + (t.done ? 'was' : dueClass)}>{t.done ? 'Due ' : ''}{formatDateShort(t.due_date)}</span>
                                    : (t.done ? null : <span className="task-due-empty">+ date</span>)}
                                onSave={v => updateTodo(t.id, { due_date: v || null })} />
                            {t.done && t.completed_at && (
                                <span className="task-done-chip" title={new Date(t.completed_at).toLocaleString()}>
                                    ✓ Done {formatDateShort(t.completed_at)}
                                </span>
                            )}
                            <InlineEdit value={t.tag || ''} options={TAG_OPTIONS}
                                display={t.tag
                                    ? <span className="tag">{tagLabel(t.tag)}</span>
                                    : (t.done ? null : <span className="task-tag-empty">+ tag</span>)}
                                onSave={v => updateTodo(t.id, { tag: v || null })} />
                            {!t.done && (
                                <InlineEdit value={t.recurrence || ''} options={RECUR_OPTIONS}
                                    display={t.recurrence
                                        ? <span className="task-recur-chip">🔁 {recurShort(t.recurrence)}</span>
                                        : <span className="task-recur-empty">+ repeat</span>}
                                    onSave={v => updateTodo(t.id, { recurrence: v || null })} />
                            )}
                        </div>
                        <button onClick={() => deleteTodo(t.id)} className="task-delete" title="Delete">×</button>
                    </div>
                );
            };

            const Section = ({ title, items, accent }) => items.length === 0 ? null : (
                <div className="task-section">
                    <div className="task-section-head">
                        <span className={'task-section-title ' + (accent || '')}>{title}</span>
                        <span className="task-section-count">{items.length}</span>
                    </div>
                    <div className="task-list">
                        {items.map(t => <TaskRow key={t.id} t={t} />)}
                    </div>
                </div>
            );

            return (
                <div style={{ maxWidth: 720, margin: '0 auto' }}>
                    <div>
                        <form className="task-add" onSubmit={e => { e.preventDefault(); addTodo(); }}>
                            <input ref={inputRef} type="text"
                                placeholder="What needs doing?"
                                value={newTitle}
                                onChange={e => setNewTitle(e.target.value)}
                                className="task-add-input"
                                enterKeyHint="done"
                                autoComplete="off" />
                            <select value={newDue} onChange={e => { setNewDue(e.target.value); if (e.target.value !== 'custom') setNewCustomDate(''); }} className="task-add-select" title="Due date">
                                <option value="">no date</option>
                                <option value="today">today</option>
                                <option value="tomorrow">tomorrow</option>
                                <option value="next_week">next week</option>
                                <option value="custom">📅 custom…</option>
                            </select>
                            {newDue === 'custom' && (
                                <input type="date" value={newCustomDate}
                                    onChange={e => setNewCustomDate(e.target.value)}
                                    className="task-add-select" style={{ paddingRight: 10 }}
                                    autoFocus />
                            )}
                            <select value={newTag} onChange={e => setNewTag(e.target.value)} className="task-add-select" title="Tag">
                                {TAG_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                            </select>
                            <select value={newRecurrence} onChange={e => setNewRecurrence(e.target.value)} className="task-add-select" title="Repeats">
                                {RECUR_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                            </select>
                            <button type="submit" className="btn btn-primary">Add</button>
                        </form>

                        {loading ? (
                            <p style={{ color: 'var(--povio-gray-500)' }}>Loading…</p>
                        ) : (open.length === 0 && done.length === 0) ? (
                            <div className="task-empty">
                                <h3>Inbox zero ✨</h3>
                                <p>Add your first task above. Tap any value to edit it.</p>
                            </div>
                        ) : (
                            <React.Fragment>
                                <Section title="Overdue"     items={overdue}  accent="overdue" />
                                <Section title="Today"       items={todayL}   accent="today" />
                                <Section title="Tomorrow"    items={tomorrow} />
                                <Section title="This week"   items={thisWeek} />
                                <Section title="Next week"   items={nextWeek} />
                                <Section title="Later"       items={later} />
                                <Section title="No date"     items={noDate} />

                                {done.length > 0 && (
                                    <div className="task-section">
                                        <div className="task-section-head clickable" onClick={() => setShowDone(s => !s)}>
                                            <span className="task-section-title">Done {showDone ? '▾' : '▸'}</span>
                                            <span className="task-section-count">{done.length}</span>
                                        </div>
                                        {showDone && <div className="task-list">{done.map(t => <TaskRow key={t.id} t={t} />)}</div>}
                                    </div>
                                )}
                            </React.Fragment>
                        )}
                    </div>
                </div>
            );
        };

        // ============== Process / Playbook (admin-only, mostly static) ==============
        const PROCESS_FLOWS = {
            outbound: [
                { num: 1, name: 'ICP & List Build',        owner: 'Vid',          tools: 'Apollo, LinkedIn',     desc: 'Define ICP, build target list (200/week), enrich contacts.' },
                { num: 2, name: 'Multi-touch Sequence',    owner: 'AM',           tools: 'Outreach, Lemlist',     desc: 'Email → LinkedIn → Email → Call → Email. 14-day cadence.' },
                { num: 3, name: 'Discovery Call',          owner: 'AM + Vid',     tools: 'Gong, Calendly',        desc: 'BANT, problem framing, intro to relevant case study.' },
                { num: 4, name: 'Scoping & Proposal',      owner: 'Vid + Eng',    tools: 'Notion, Pitch',          desc: 'SOW, team match, pricing, proposal deck.' },
                { num: 5, name: 'Negotiation & Close',     owner: 'Vid',           tools: 'DocuSign',               desc: 'MSA, SOW, kickoff scheduling.' },
            ],
            inbound: [
                { num: 1, name: 'Lead Capture',            owner: 'Marketing',     tools: 'Webflow, HubSpot',       desc: 'Web form, content downloads, demo requests.' },
                { num: 2, name: 'Qualification (24h SLA)', owner: 'Vid (rotating)', tools: 'HubSpot, Slack',        desc: 'Quick BANT screen, route to AM.' },
                { num: 3, name: 'Discovery Call',          owner: 'AM',            tools: 'Gong',                  desc: 'Same as outbound discovery.' },
                { num: 4, name: 'Proposal & Close',        owner: 'Vid + AM',      tools: 'Pitch, DocuSign',        desc: 'Standard proposal flow.' },
            ],
            partnership: [
                { num: 1, name: 'Partner Intro',           owner: 'Vid',          tools: 'Email, Slack Connect',   desc: 'Partner sends warm intro to prospect.' },
                { num: 2, name: 'Joint Discovery',         owner: 'Vid + Partner', tools: 'Gong',                  desc: 'Three-way call with partner sponsor.' },
                { num: 3, name: 'Co-pitched Proposal',     owner: 'Vid',          tools: 'Pitch, DocuSign',        desc: 'Joint solution, revenue share documented.' },
            ]
        };
        const ProcessView = () => {
            const [flow, setFlow] = useState('outbound');
            return (
                <div>
                    <div style={{ display: 'flex', gap: 6, padding: 4, background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: 10, marginBottom: 18, width: 'fit-content' }}>
                        {Object.keys(PROCESS_FLOWS).map(f => (
                            <button key={f} className={'view-btn ' + (flow === f ? 'active' : '')} onClick={() => setFlow(f)}>{f}</button>
                        ))}
                    </div>
                    <div className="process-flow">
                        {PROCESS_FLOWS[flow].map(s => (
                            <div key={s.num} className="process-step-card">
                                <div className="process-step-num">{s.num}</div>
                                <div className="process-step-name">{s.name}</div>
                                <div className="process-step-desc">{s.desc}</div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 12 }}>
                                    <span className="tag tag-blue">{s.owner}</span>
                                    <span className="tag">{s.tools}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ============== Admin (incl. one-time 198-account import flow) ==============
        const ImportFlow = ({ user, currentPovioUser, allowedUsers, onWhalesRefresh }) => {
            // Lazy-load accounts-seed.js the first time this component renders
            const [seedLoaded, setSeedLoaded] = useState(typeof window.POVIO_ACCOUNTS !== 'undefined');
            const [seedError, setSeedError] = useState(null);
            const [dryRun, setDryRun] = useState(null);
            const [importing, setImporting] = useState(false);
            const [importLog, setImportLog] = useState([]);
            const [done, setDone] = useState(false);

            useEffect(() => {
                if (seedLoaded) return;
                const s = document.createElement('script');
                s.src = 'accounts-seed.js';
                s.onload = () => setSeedLoaded(true);
                s.onerror = () => setSeedError('Could not load accounts-seed.js. Check that the file exists at the repo root.');
                document.body.appendChild(s);
            }, []);

            const normalize = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');

            const runDryRun = async () => {
                if (!seedLoaded) return;
                const { data: existing } = await supabaseClient.from('whales').select('id, name');
                const existingByName = new Map((existing || []).map(w => [normalize(w.name), w]));
                const buckets = { insert: [], update: [], skip: [] };
                for (const a of window.POVIO_ACCOUNTS) {
                    const match = existingByName.get(normalize(a.company_name));
                    if (!match) buckets.insert.push({ source: a, existing: null });
                    else buckets.update.push({ source: a, existing: match });
                }
                setDryRun(buckets);
            };

            const runImport = async () => {
                if (!dryRun) return;
                setImporting(true);
                const log = [];
                const allowedPovioIds = new Set(allowedUsers.map(u => u.povio_id).filter(Boolean));

                const toWhaleRow = (a) => {
                    // owner_povio_id may be from B's data but not in allowed_users — fallback to unassigned
                    const owner = allowedPovioIds.has(a.owner_id) ? a.owner_id : 'u_unassigned';
                    const arrInThousands = a.arr_estimated > 0 ? Math.round(a.arr_estimated / 1000) : 0;
                    return {
                        user_id: user.id,                 // stamp with importing admin's auth uid (for ownership history)
                        name: a.company_name,
                        industry: a.industry || '',
                        health: a.health_status || 'healthy',
                        arr: arrInThousands,
                        ltv: 0,
                        contract_end: null,
                        account_manager: (allowedUsers.find(u => u.povio_id === owner) || {}).name || '',
                        last_qbr: null,
                        next_qbr: null,
                        expansion: 'Low',
                        churn_risk: 'Low',
                        notes: a.last_note || '',
                        contacts: [],
                        referrals_count: 0,
                        referrals_revenue: 0,
                        is_key_account: !!a.is_key_account,
                        fte: a.fte || 0,
                        engagement_type: a.engagement_type || 'team_aug',
                        engagement_hours_week: a.engagement_hours_week || '',
                        account_status_raw: a.account_status_raw || '',
                        forecast_raw: a.forecast_raw || '',
                        expansion_potential: a.expansion_potential || 'none',
                        potential_flag: a.potential_flag || '',
                        last_note: a.last_note || '',
                        project_manager: a.project_manager || '',
                        team_members: a.team_members || [],
                        invoicing_note: a.invoicing_note || '',
                        qbr_history: a.qbr_history || [],
                        owner_povio_id: owner,
                        created_date: a.created || null,
                        last_touch_at: a.last_touch_at || a.created || null,
                        source: 'am_board_import',
                        updated_by_povio_id: currentPovioUser.povio_id
                    };
                };

                // Inserts in batches of 50
                const toInsert = dryRun.insert.map(r => toWhaleRow(r.source));
                for (let i = 0; i < toInsert.length; i += 50) {
                    const batch = toInsert.slice(i, i + 50);
                    const { error } = await supabaseClient.from('whales').insert(batch);
                    if (error) { log.push('❌ insert batch ' + (i / 50 + 1) + ': ' + error.message); }
                    else       { log.push('✓ inserted batch ' + (i / 50 + 1) + ' (' + batch.length + ' rows)'); }
                    setImportLog([...log]);
                }

                // Updates: fill in new columns only — never overwrite existing arr/notes/contacts
                for (const r of dryRun.update) {
                    const a = r.source;
                    const enrichment = {
                        is_key_account: true,
                        fte: a.fte || 0,
                        engagement_type: a.engagement_type || 'team_aug',
                        engagement_hours_week: a.engagement_hours_week || '',
                        account_status_raw: a.account_status_raw || '',
                        forecast_raw: a.forecast_raw || '',
                        expansion_potential: a.expansion_potential || 'none',
                        potential_flag: a.potential_flag || '',
                        last_note: a.last_note || r.existing.notes,
                        project_manager: a.project_manager || '',
                        team_members: a.team_members || [],
                        invoicing_note: a.invoicing_note || '',
                        qbr_history: a.qbr_history || [],
                        owner_povio_id: allowedPovioIds.has(a.owner_id) ? a.owner_id : 'u_unassigned',
                        source: 'merged'
                    };
                    const { error } = await supabaseClient.from('whales').update(enrichment).eq('id', r.existing.id);
                    if (error) { log.push('❌ enrich "' + a.company_name + '": ' + error.message); }
                    else       { log.push('✓ enriched "' + a.company_name + '"'); }
                    setImportLog([...log]);
                }

                setImporting(false);
                setDone(true);
                if (onWhalesRefresh) onWhalesRefresh();
            };

            if (seedError) return <div style={{ padding: 20, background: 'var(--povio-danger-subtle)', color: 'var(--povio-danger)', borderRadius: 8 }}>{seedError}</div>;
            if (!seedLoaded) return <div style={{ padding: 20, color: 'var(--povio-gray-500)' }}>Loading import data…</div>;

            return (
                <div>
                    <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>Import 198 accounts from Povio AM board</h3>
                    <p style={{ fontSize: 13, color: 'var(--povio-gray-500)', marginBottom: 18 }}>
                        Loaded {window.POVIO_ACCOUNTS?.length || 0} accounts from accounts-seed.js. Run dry-run first to preview matches against existing whales. Nothing is written until you click <strong>Run import</strong>.
                    </p>

                    {!dryRun && (
                        <button className="btn btn-primary" onClick={runDryRun}>Run dry-run</button>
                    )}

                    {dryRun && !done && (
                        <div>
                            <div style={{ display: 'flex', gap: 12, marginBottom: 14, flexWrap: 'wrap' }}>
                                <span className="import-bucket insert">{dryRun.insert.length} to insert</span>
                                <span className="import-bucket update">{dryRun.update.length} to enrich (name match)</span>
                                <span className="import-bucket skip">{dryRun.skip.length} skipped</span>
                            </div>
                            <div style={{ maxHeight: 360, overflowY: 'auto', border: '1px solid var(--povio-border)', borderRadius: 8, marginBottom: 14 }}>
                                <div className="import-row head">
                                    <div></div><div>Source name</div><div>Owner</div><div>FTE</div><div>ARR (est)</div><div>Bucket</div>
                                </div>
                                {[...dryRun.insert.map(r => ({ ...r, bucket: 'insert' })), ...dryRun.update.map(r => ({ ...r, bucket: 'update' }))].slice(0, 60).map((r, i) => {
                                    const owner = allowedUsers.find(u => u.povio_id === r.source.owner_id);
                                    return (
                                        <div className="import-row" key={i}>
                                            <div>{i + 1}</div>
                                            <div><strong>{r.source.company_name}</strong>{r.existing && <div style={{ fontSize: 10, color: 'var(--povio-gray-500)' }}>→ enriches whale id #{r.existing.id}</div>}</div>
                                            <div>{owner?.name || <span style={{ color: 'var(--povio-gray-400)' }}>Unassigned</span>}</div>
                                            <div>{r.source.fte || 0}</div>
                                            <div>{fmtARR(r.source.arr_estimated / 1000)}</div>
                                            <div><span className={'import-bucket ' + r.bucket}>{r.bucket}</span></div>
                                        </div>
                                    );
                                })}
                                {(dryRun.insert.length + dryRun.update.length) > 60 && (
                                    <div style={{ padding: 12, textAlign: 'center', color: 'var(--povio-gray-500)', fontSize: 12 }}>… and {dryRun.insert.length + dryRun.update.length - 60} more</div>
                                )}
                            </div>
                            <button className="btn btn-primary" onClick={runImport} disabled={importing}>
                                {importing ? 'Importing…' : 'Run import (writes to database)'}
                            </button>
                            <button className="btn btn-secondary" style={{ marginLeft: 8 }} onClick={() => setDryRun(null)}>Reset</button>
                        </div>
                    )}

                    {(importing || done) && (
                        <div style={{ marginTop: 18, padding: 14, background: 'var(--povio-bg)', borderRadius: 8, fontSize: 12, fontFamily: 'monospace', maxHeight: 300, overflowY: 'auto' }}>
                            {importLog.map((l, i) => <div key={i}>{l}</div>)}
                            {done && <div style={{ marginTop: 12, fontWeight: 700, color: 'var(--povio-success)' }}>✓ Done. Switch to Accounts to see the imported data.</div>}
                        </div>
                    )}
                </div>
            );
        };

        const AdminView = ({ whales, allowedUsers, user, currentPovioUser, onWhalesRefresh }) => {
            const [tab, setTab] = useState('import');
            return (
                <div>
                    <div style={{ display: 'flex', gap: 6, padding: 4, background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: 10, marginBottom: 18, width: 'fit-content' }}>
                        <button className={'view-btn ' + (tab === 'import' ? 'active' : '')} onClick={() => setTab('import')}>Import 198 accounts</button>
                        <button className={'view-btn ' + (tab === 'team' ? 'active' : '')} onClick={() => setTab('team')}>Team allowlist</button>
                        <button className={'view-btn ' + (tab === 'data' ? 'active' : '')} onClick={() => setTab('data')}>Data status</button>
                    </div>
                    {tab === 'import' && <ImportFlow user={user} currentPovioUser={currentPovioUser} allowedUsers={allowedUsers} onWhalesRefresh={onWhalesRefresh} />}
                    {tab === 'team' && (
                        <table className="data-table">
                            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Povio ID</th></tr></thead>
                            <tbody>
                                {allowedUsers.map(u => (
                                    <tr key={u.email}>
                                        <td><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><div style={{ width: 22, height: 22, borderRadius: '50%', background: u.color || '#A3A3A3', color: 'white', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700 }}>{u.initials || '?'}</div>{u.name || '(no name)'}</div></td>
                                        <td>{u.email}</td>
                                        <td><span className={'role-chip ' + (u.role === 'admin' ? 'admin' : 'rep')}>{u.role}</span></td>
                                        <td style={{ fontFamily: 'monospace', fontSize: 11, color: 'var(--povio-gray-500)' }}>{u.povio_id || '—'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                    {tab === 'data' && (
                        <div className="stats-bar" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
                            <div className="kpi-card">
                                <h3>Whales in DB</h3>
                                <div className="value">{whales.length}</div>
                                <div className="sub">{whales.filter(w => w.source === 'am_board_import').length} from import · {whales.filter(w => w.is_key_account).length} key</div>
                            </div>
                            <div className="kpi-card">
                                <h3>Team members</h3>
                                <div className="value">{allowedUsers.length}</div>
                                <div className="sub">{allowedUsers.filter(u => u.role === 'admin').length} admin · {allowedUsers.filter(u => u.role === 'rep').length} reps</div>
                            </div>
                            <div className="kpi-card">
                                <h3>Total ARR</h3>
                                <div className="value blue">{fmtARR(whales.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</div>
                                <div className="sub">Across all accounts</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // =====================================================================
        // END MERGED VIEWS
        // =====================================================================

        const LoginScreen = ({ onLogin, onLoginGoogle, onClearSession, error }) => {
            return (
                <div className="login-container">
                    <div className="login-card">
                        <div className="login-logo">
                            <PovioLogo />
                        </div>
                        <h1 className="login-title">Welcome Back</h1>
                        <p className="login-subtitle">Sign in to access the sales command center</p>
                        {error && (
                            <p style={{
                                color: 'var(--povio-danger)',
                                background: '#fff0f0',
                                border: '1px solid var(--povio-danger)',
                                borderRadius: '6px',
                                padding: '10px 14px',
                                marginBottom: '12px',
                                fontSize: '14px',
                                textAlign: 'center'
                            }}>{error}</p>
                        )}
                        <button className="login-btn" onClick={onLogin}>
                            Sign in with GitHub
                        </button>
                        <div className="login-divider">or</div>
                        <button className="login-btn-google" onClick={onLoginGoogle}>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Sign in with Google (@povio.com)
                        </button>
                        <p style={{ fontSize: 11, color: 'var(--povio-gray-500)', textAlign: 'center', marginTop: 14, lineHeight: 1.5 }}>
                            Vid signs in with GitHub. AMs sign in with their @povio.com Google account.<br/>
                            Email not on the team list? Ask Vid to add you.
                        </p>
                        {onClearSession && (
                            <p style={{ fontSize: 11, color: 'var(--povio-gray-400)', textAlign: 'center', marginTop: 10 }}>
                                Stuck? <a href="#" onClick={(e) => { e.preventDefault(); onClearSession(); }} style={{ color: 'var(--povio-blue)', textDecoration: 'underline', cursor: 'pointer' }}>Clear session and retry</a>
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== ERROR BOUNDARY ====================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('❌ Error caught by boundary:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="login-container">
                            <div className="login-card" style={{ textAlign: 'center', padding: '40px' }}>
                                <h2 style={{ color: 'var(--povio-danger)', marginBottom: '16px' }}>
                                    ⚠️ Something went wrong
                                </h2>
                                <p style={{ color: 'var(--povio-gray-700)', marginBottom: '24px' }}>
                                    An error occurred while loading the application.
                                </p>
                                <button
                                    className="btn btn-primary"
                                    onClick={() => window.location.reload()}
                                >
                                    Reload Page
                                </button>
                                {this.state.error && (
                                    <details style={{ marginTop: '24px', textAlign: 'left' }}>
                                        <summary style={{ cursor: 'pointer', color: 'var(--povio-gray-600)' }}>
                                            Error details
                                        </summary>
                                        <pre style={{
                                            marginTop: '8px',
                                            padding: '12px',
                                            background: 'var(--povio-gray-100)',
                                            borderRadius: '4px',
                                            fontSize: '12px',
                                            overflow: 'auto'
                                        }}>
                                            {this.state.error.toString()}
                                        </pre>
                                    </details>
                                )}
                            </div>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // ==================== MAIN APP ====================
        const App = () => {
            const [user, setUser] = useState(null);
            const [currentPovioUser, setCurrentPovioUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [loginError, setLoginError] = useState(null);

            // ============================================================
            // Auth flow — single state machine, hang-proof.
            // ------------------------------------------------------------
            // Previous design called both supabaseClient.auth.getSession()
            // AND subscribed to onAuthStateChange. The listener fires with
            // INITIAL_SESSION on subscription, so linkAllowedUser ran twice
            // concurrently on every page load. Combined with a stale token
            // in localStorage that triggers the SDK's internal refresh-lock
            // deadlock, this produced an indefinite "stuck on Loading" with
            // no thrown error and no finally fired.
            //
            // New design:
            //   1. Subscribe to onAuthStateChange ONLY. The first event
            //      (INITIAL_SESSION) drives initial render.
            //   2. Hard 6-second wall-clock timeout. If no auth event has
            //      fired in 6s, we force-clear loading and show a
            //      LoginScreen with a self-rescue button.
            //   3. A ref-based mutex prevents concurrent linkAllowedUser
            //      runs if the listener fires more than once before the
            //      first call completes (e.g. SIGNED_IN immediately after
            //      INITIAL_SESSION on first login).
            // ============================================================
            const linkLockRef = useRef(false);
            const settledRef = useRef(false);  // true once loading=false has been set, by ANY path

            // Race a promise against a timeout. Resolves with the promise result, or rejects after `ms`.
            const withTimeout = (promise, ms, label) => Promise.race([
                promise,
                new Promise((_, rej) => setTimeout(() => rej(new Error(label + ' timed out after ' + ms + 'ms')), ms))
            ]);

            const linkAllowedUser = async (sess_user) => {
                if (linkLockRef.current) return;          // mutex
                linkLockRef.current = true;
                try {
                    if (!sess_user) { setCurrentPovioUser(null); return; }
                    const email = (sess_user.email || '').toLowerCase();
                    if (!email) {
                        setLoginError('Sign-in succeeded but no email is associated with your account.');
                        await withTimeout(supabaseClient.auth.signOut(), 3000, 'signOut').catch(()=>{});
                        return;
                    }
                    // Cap the Supabase query at 4s. If the SDK hangs on an internal token
                    // refresh, the promise above never resolves — without this timeout
                    // setLoading(false) never runs and the page hangs forever.
                    const result = await withTimeout(
                        supabaseClient
                            .from('allowed_users')
                            .select('email, role, povio_id, name, initials, color')
                            .eq('email', email)
                            .maybeSingle(),
                        7000,
                        'allowed_users lookup'
                    );
                    const { data, error } = result || {};
                    if (error) {
                        console.error('Error fetching allowed_users row:', error);
                        setLoginError('Unable to verify access. Try again in a moment.');
                        await withTimeout(supabaseClient.auth.signOut(), 3000, 'signOut').catch(()=>{});
                        return;
                    }
                    if (!data) {
                        setLoginError('Your email (' + email + ') is not on the team list. Ask Vid to add you.');
                        await withTimeout(supabaseClient.auth.signOut(), 3000, 'signOut').catch(()=>{});
                        return;
                    }
                    setCurrentPovioUser(data);
                } catch (err) {
                    console.error('linkAllowedUser failed:', err);
                    setLoginError('Could not verify access (' + (err.message || 'unknown error') + '). Click "Clear session and retry" below.');
                } finally {
                    linkLockRef.current = false;
                }
            };

            useEffect(() => {
                // Watchdog: independent of any Supabase code path. If anything in the
                // boot sequence hangs (SDK token refresh, network, JS error in the
                // listener, etc.), this guarantees the user sees LoginScreen + rescue
                // button within `8000`ms. clearTimeout only fires when the work is
                // actually done — never preemptively.
                const watchdog = setTimeout(() => {
                    if (settledRef.current) return;
                    settledRef.current = true;
                    setLoginError('Authentication timed out — your session may be corrupted. Click "Clear session and retry" below.');
                    setLoading(false);
                }, 8000);

                const settle = () => {
                    if (settledRef.current) return;
                    settledRef.current = true;
                    clearTimeout(watchdog);
                    setLoading(false);
                };

                let subscription = null;
                try {
                    const { data } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
                        setUser(session?.user ?? null);
                        try {
                            await linkAllowedUser(session?.user ?? null);
                        } catch (e) {
                            console.error('Auth state change handler error:', e);
                        }
                        settle();
                    });
                    subscription = data?.subscription;
                } catch (err) {
                    console.error('Failed to subscribe to auth changes:', err);
                    setLoginError('Failed to initialize authentication. Click "Clear session and retry" below.');
                    settle();
                }

                return () => {
                    clearTimeout(watchdog);
                    if (subscription) subscription.unsubscribe();
                };
            }, []);

            // Nuclear option for stuck sessions: wipe Supabase auth from
            // localStorage and reload. Called from the LoginScreen rescue
            // button. Safe to run even with no session — it just no-ops
            // most of the keys.
            const handleClearSession = async () => {
                try {
                    await supabaseClient.auth.signOut({ scope: 'local' });
                } catch (_) { /* ignore — proceeding to nuke storage anyway */ }
                try {
                    Object.keys(localStorage)
                        .filter(k => k.startsWith('sb-') || k.includes('supabase'))
                        .forEach(k => localStorage.removeItem(k));
                } catch (_) {}
                window.location.reload();
            };

            const handleLogin = async () => {
                setLoginError(null);

                if (!navigator.onLine) {
                    setLoginError('No internet connection. Please check your network and try again.');
                    return;
                }

                // Preflight: verify Supabase is reachable before doing a hard redirect.
                // signInWithOAuth navigates the whole page away, so if the domain is down
                // (project paused, DNS failure, etc.) the user ends up on the dinosaur page.
                try {
                    const controller = new AbortController();
                    const tid = setTimeout(() => controller.abort(), 5000);
                    await fetch('https://jiufnsnxuvhqwzozhlwm.supabase.co/auth/v1/health', {
                        signal: controller.signal,
                        mode: 'no-cors'
                    });
                    clearTimeout(tid);
                } catch (err) {
                    setLoginError('Cannot reach the authentication server. The Supabase project may be paused — please visit supabase.com to resume it, then try again.');
                    return;
                }

                try {
                    const { error } = await supabaseClient.auth.signInWithOAuth({
                        provider: 'github',
                        options: {

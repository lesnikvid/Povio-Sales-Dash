                        <div style={{ display: 'flex', gap: '8px' }}>
                            {[{v:'vacation',l:'Vacation',c:'var(--povio-event-vacation)'},{v:'work_trip',l:'Work Trip',c:'var(--povio-event-trip)'},{v:'sick_leave',l:'Sick Leave',c:'var(--povio-event-sick)'}].map(t => (
                                <button key={t.v} onClick={() => setType(t.v)} style={{
                                    flex:1, padding:'8px', fontSize:'13px', fontWeight:'600', borderRadius:'6px', cursor:'pointer',
                                    color: type===t.v ? '#fff' : 'var(--povio-gray-700)',
                                    background: type===t.v ? t.c : 'var(--povio-gray-100)',
                                    border: type===t.v ? 'none' : '1px solid var(--povio-border)'
                                }}>{t.l}</button>
                            ))}
                        </div>
                    </div>
                    <div style={{ marginBottom: '14px' }}>
                        <label style={formLabelStyle}>Title (optional)</label>
                        <input value={title} onChange={e => setTitle(e.target.value)} style={formInputStyle} placeholder="e.g. Family vacation, Berlin conference" />
                    </div>
                    <div style={{ display: 'flex', gap: '10px', marginBottom: '14px' }}>
                        <div style={{ flex: 1 }}>
                            <label style={formLabelStyle}>Start Date *</label>
                            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={formInputStyle} />
                        </div>
                        <div style={{ flex: 1 }}>
                            <label style={formLabelStyle}>End Date *</label>
                            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} style={formInputStyle} />
                        </div>
                    </div>
                    <div style={{ marginBottom: '20px' }}>
                        <label style={formLabelStyle}>Notes (optional)</label>
                        <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3} style={{ ...formInputStyle, resize: 'vertical' }} placeholder="Additional details..." />
                    </div>
                    <div style={{ display: 'flex', gap: '8px', justifyContent: event ? 'space-between' : 'flex-end', alignItems: 'center' }}>
                        {event && (
                            <button onClick={() => { if(confirm('Delete this event?')) { onDelete(event.id); onClose(); }}}
                                style={{ padding: '8px 12px', background: '#fee2e2', color: '#dc2626', border: '1px solid #fca5a5', borderRadius: '6px', fontSize: '12px', fontWeight: '600', cursor: 'pointer' }}>
                                Delete
                            </button>
                        )}
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button onClick={onClose} style={{ padding: '8px 14px', background: 'var(--povio-gray-100)', color: 'var(--povio-gray-700)', border: '1px solid var(--povio-border)', borderRadius: '6px', fontSize: '13px', fontWeight: '600', cursor: 'pointer' }}>Cancel</button>
                            <button onClick={save} disabled={!memberSelect || !startDate || !endDate}
                                style={{ padding: '8px 14px', background: 'var(--povio-blue)', color: '#fff', border: 'none', borderRadius: '6px', fontSize: '13px', fontWeight: '600', cursor: (memberSelect && startDate && endDate) ? 'pointer' : 'not-allowed', opacity: (memberSelect && startDate && endDate) ? 1 : 0.5 }}>
                                {event ? 'Save' : 'Add Event'}
                            </button>
                        </div>
                    </div>
                </TeamModal>
            );
        };

        const CALENDAR_PRIORITY_ORDER = ['Vid Lešnik', 'Žiga Triller', 'Daša Ravter', 'Sara Petrič', 'Gregor Špan'];
        const EVENT_LABELS = { vacation: 'Vacation', sick_leave: 'Sick Leave', work_trip: 'Work Trip' };
        const eventLabel = (type) => EVENT_LABELS[type] || EVENT_LABELS.work_trip;
        const eventTypeClass = (type) => EVENT_LABELS[type] ? type : 'work_trip';

        const CalendarView = ({ teamData, events, onUpdateEvents }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [monthsToShow, setMonthsToShow] = useState(1);
            const [editingEvent, setEditingEvent] = useState(null);
            const [addingEvent, setAddingEvent] = useState(false);
            const [selectedMemberForAdd, setSelectedMemberForAdd] = useState(null);

            const structure = normalizeTeamStructure(teamData?.structure);
            const members = structure.members || {};

            const membersList = useMemo(() => Object.values(members).sort((a, b) => {
                const aIdx = CALENDAR_PRIORITY_ORDER.indexOf(a.name);
                const bIdx = CALENDAR_PRIORITY_ORDER.indexOf(b.name);
                if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                if (aIdx !== -1) return -1;
                if (bIdx !== -1) return 1;
                return (a.name || '').localeCompare(b.name || '');
            }), [members]);

            const { monthsArray, rangeStart, rangeEnd, totalDays } = useMemo(() => {
                const y = currentMonth.getFullYear();
                const m = currentMonth.getMonth();
                const months = Array.from({ length: monthsToShow }, (_, i) => {
                    const date = new Date(y, m + i, 1);
                    const days = new Date(y, m + i + 1, 0).getDate();
                    return { date, days };
                });
                const last = months[months.length - 1];
                return {
                    monthsArray: months,
                    rangeStart: months[0].date,
                    rangeEnd: new Date(last.date.getFullYear(), last.date.getMonth(), last.days),
                    totalDays: months.reduce((sum, mo) => sum + mo.days, 0)
                };
            }, [currentMonth, monthsToShow]);

            // Group events by member for fast row rendering
            const eventsByMember = useMemo(() => {
                const map = new Map();
                for (const e of events) {
                    if (!map.has(e.member_id)) map.set(e.member_id, []);
                    map.get(e.member_id).push(e);
                }
                return map;
            }, [events]);

            const prevPeriod = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - monthsToShow, 1));
            const nextPeriod = () => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + monthsToShow, 1));
            const today = () => setCurrentMonth(new Date());

            const addEvent = (ev) => onUpdateEvents([...events, { ...ev, id: Date.now() }]);
            const updateEvent = (updated) => onUpdateEvents(events.map(e => e.id === updated.id ? updated : e));
            const deleteEvent = (id) => onUpdateEvents(events.filter(e => e.id !== id));

            const periodLabel = monthsToShow === 1
                ? rangeStart.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
                : `${monthsArray[0].date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })} - ${monthsArray[monthsArray.length - 1].date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}`;

            // Position an event on the timeline as { left%, width% }, clipped to the visible range.
            // Returns null if the event doesn't overlap.
            const dayMs = 24 * 60 * 60 * 1000;
            const eventPosition = (evt) => {
                const [sy, sm, sd] = evt.start_date.split('-').map(Number);
                const [ey, em, ed] = evt.end_date.split('-').map(Number);
                const eStart = new Date(sy, sm - 1, sd).getTime();
                const eEnd = new Date(ey, em - 1, ed).getTime();
                const rStart = rangeStart.getTime();
                const rEnd = rangeEnd.getTime();
                if (eEnd < rStart || eStart > rEnd) return null;
                const visStart = Math.max(eStart, rStart);
                const visEnd = Math.min(eEnd, rEnd);
                const startOffset = (visStart - rStart) / dayMs;
                const duration = (visEnd - visStart) / dayMs + 1;
                return { left: (startOffset / totalDays) * 100, width: (duration / totalDays) * 100 };
            };

            // Today indicator position
            const now = new Date();
            const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const todayPct = todayMidnight >= rangeStart.getTime() && todayMidnight <= rangeEnd.getTime()
                ? ((todayMidnight - rangeStart.getTime()) / dayMs / totalDays) * 100
                : null;

            // Cumulative day offsets at the start of each month (excluding the first), for dividers
            const monthDividers = monthsArray.slice(1).map((_, i) => {
                const offsetDays = monthsArray.slice(0, i + 1).reduce((s, mo) => s + mo.days, 0);
                return (offsetDays / totalDays) * 100;
            });

            return (
                <div className="calendar-view">
                    <div className="calendar-toolbar">
                        <div className="calendar-toolbar-group">
                            <button className="calendar-nav-btn" onClick={prevPeriod}>‹</button>
                            <h2 className="calendar-period-label">{periodLabel}</h2>
                            <button className="calendar-nav-btn" onClick={nextPeriod}>›</button>
                            <button className="calendar-nav-btn today" onClick={today}>Today</button>
                            <div className="calendar-period-switcher">
                                {[1, 3, 6].map(n => (
                                    <button key={n}
                                        className={`calendar-period-btn${monthsToShow === n ? ' active' : ''}`}
                                        onClick={() => setMonthsToShow(n)}>
                                        {n} {n === 1 ? 'Month' : 'Months'}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="calendar-toolbar-group" style={{ gap: '16px' }}>
                            <div className="calendar-legend">
                                <div className="calendar-legend-item"><div className="calendar-legend-swatch vacation" /><span>Vacation</span></div>
                                <div className="calendar-legend-item"><div className="calendar-legend-swatch work_trip" /><span>Work Trip</span></div>
                                <div className="calendar-legend-item"><div className="calendar-legend-swatch sick_leave" /><span>Sick Leave</span></div>
                            </div>
                            <button className="calendar-add-btn" onClick={() => { setSelectedMemberForAdd(null); setAddingEvent(true); }}>
                                + Add Event
                            </button>
                        </div>
                    </div>

                    <div className="calendar-gantt">
                        <div className="calendar-gantt-header">
                            <div className="calendar-gantt-member-col">Team Member</div>
                            <div className="calendar-gantt-track header-track">
                                {monthsArray.map((mo, i) => (
                                    <div key={i} className="calendar-gantt-month-label" style={{ width: `${(mo.days / totalDays) * 100}%` }}>
                                        {mo.date.toLocaleDateString('en-US', { month: 'short', year: monthsToShow > 1 ? '2-digit' : 'numeric' })}
                                    </div>
                                ))}
                            </div>
                        </div>
                        {membersList.length === 0 ? (
                            <div className="calendar-gantt-empty">No team members yet. Add members in the Team tab first.</div>
                        ) : membersList.map((member) => (
                            <div key={member.id} className="calendar-gantt-row">
                                <div className="calendar-gantt-member-col">{member.name}</div>
                                <div className="calendar-gantt-track">
                                    {monthDividers.map((pct, i) => (
                                        <div key={i} className="calendar-gantt-divider" style={{ left: `${pct}%` }} />
                                    ))}
                                    {todayPct !== null && <div className="calendar-gantt-today" style={{ left: `${todayPct}%` }} />}
                                    {(eventsByMember.get(member.id) || []).map(evt => {
                                        const pos = eventPosition(evt);
                                        if (!pos) return null;
                                        return (
                                            <div
                                                key={evt.id}
                                                className={`calendar-gantt-event ${eventTypeClass(evt.event_type)}`}
                                                style={{ left: `${pos.left}%`, width: `${pos.width}%` }}
                                                onClick={() => setEditingEvent(evt)}
                                                title={`${eventLabel(evt.event_type)}${evt.title ? ': ' + evt.title : ''}\n${evt.start_date} to ${evt.end_date}${evt.notes ? '\n' + evt.notes : ''}`}>
                                                {evt.title || eventLabel(evt.event_type)}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {editingEvent && (
                        <CalendarEventModal
                            event={editingEvent}
                            members={members}
                            onSave={updateEvent}
                            onDelete={deleteEvent}
                            onClose={() => setEditingEvent(null)}
                        />
                    )}
                    {addingEvent && (
                        <CalendarEventModal
                            event={selectedMemberForAdd ? { member_id: selectedMemberForAdd } : null}
                            members={members}
                            onSave={addEvent}
                            onDelete={() => {}}
                            onClose={() => { setAddingEvent(false); setSelectedMemberForAdd(null); }}
                        />
                    )}
                </div>
            );
        };

        const TeamView = ({ teamData, onUpdate, user }) => {
            const [editMode, setEditMode] = useState(false);
            const [editingMemberId, setEditingMemberId] = useState(null);
            const [editingDeptId, setEditingDeptId] = useState(null);
            const [addingPerson, setAddingPerson] = useState(false);
            const [addingPersonForDept, setAddingPersonForDept] = useState(null);
            const [pickingForDept, setPickingForDept] = useState(null);
            const [saving, setSaving] = useState(false);

            const structure = normalizeTeamStructure(teamData?.structure);
            const members = structure.members;

            const commit = async (next) => {
                setSaving(true);
                try { await onUpdate(next); } finally { setSaving(false); }
            };

            const updateMember = (updated) => {
                const next = { ...structure, members: { ...members, [updated.id]: updated } };
                commit(next);
            };

            const deleteMember = (memberId) => {
                const nextMembers = { ...members };
                delete nextMembers[memberId];
                const nextDepts = structure.departments.map(d => ({
                    ...d,
                    leadMemberId: d.leadMemberId === memberId ? null : d.leadMemberId,
                    memberIds: (d.memberIds || []).filter(id => id !== memberId),
                    segments: (d.segments || []).map(s => s.memberId === memberId ? { ...s, memberId: null } : s)
                }));
                const nextReports = {};
                Object.entries(structure.reports || {}).forEach(([k, v]) => {
                    if (k === memberId) return;
                    nextReports[k] = (v || []).filter(id => id !== memberId);
                });
                const nextRoot = structure.root === memberId ? (Object.keys(nextMembers)[0] || null) : structure.root;
                commit({ ...structure, members: nextMembers, departments: nextDepts, reports: nextReports, root: nextRoot });
            };

            const addPerson = (memberData, deptId) => {
                const id = genTeamId('m');
                const newMember = { id, ...memberData };
                const nextStructure = {
                    ...structure,
                    members: { ...members, [id]: newMember }
                };
                if (deptId) {
                    nextStructure.departments = structure.departments.map(d =>
                        d.id === deptId ? { ...d, memberIds: [...(d.memberIds || []), id] } : d
                    );
                }
                commit(nextStructure);
            };

            const addExistingMemberToDept = (deptId, memberId) => {
                const nextDepts = structure.departments.map(d =>
                    d.id === deptId && !(d.memberIds || []).includes(memberId)
                        ? { ...d, memberIds: [...(d.memberIds || []), memberId] }
                        : d
                );
                commit({ ...structure, departments: nextDepts });
            };

            const removeMemberFromDept = (deptId, memberId) => {
                const nextDepts = structure.departments.map(d =>
                    d.id === deptId ? { ...d, memberIds: (d.memberIds || []).filter(id => id !== memberId) } : d
                );
                commit({ ...structure, departments: nextDepts });
            };

            const updateDept = (updated) => {
                const nextDepts = structure.departments.map(d => d.id === updated.id ? updated : d);
                commit({ ...structure, departments: nextDepts });
            };

            const deleteDept = (deptId) => {
                commit({ ...structure, departments: structure.departments.filter(d => d.id !== deptId) });
            };

            const addDept = (managerId) => {
                const newDept = {
                    id: genTeamId('d'),
                    name: 'New Department',
                    color: DEPT_COLOR_OPTIONS[structure.departments.length % DEPT_COLOR_OPTIONS.length],
                    managerId,
                    leadMemberId: null, leadLabel: null,
                    memberIds: [], segments: [], vacancy: null
                };
                commit({ ...structure, departments: [...structure.departments, newDept] });
                setEditingDeptId(newDept.id);
            };

            // Which members are NOT in this dept (available to add)
            const candidatesForDept = (deptId) => {
                const dept = structure.departments.find(d => d.id === deptId);
                const taken = new Set(dept?.memberIds || []);
                return Object.values(members).filter(m => !taken.has(m.id)).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            };

            // Render a person node + any departments they manage + any direct reports (recursive)
            const renderPersonSubtree = (personId, primary = false) => {
                const person = members[personId];
                if (!person) return null;
                const managedDepts = structure.departments.filter(d => d.managerId === personId);
                const directReports = (structure.reports || {})[personId] || [];
                const hasChildren = managedDepts.length > 0 || directReports.length > 0;

                const personNode = (
                    <div
                        onClick={editMode ? () => setEditingMemberId(personId) : undefined}
                        style={{ cursor: editMode ? 'pointer' : 'default', position: 'relative' }}
                        title={editMode ? 'Click to edit' : undefined}
                    >
                        <div style={{
                            display: 'flex', alignItems: 'center', gap: '10px',
                            background: 'var(--povio-white)',
                            border: primary
                                ? (editMode ? '2px solid var(--povio-blue)' : '2px solid var(--povio-blue)')
                                : (editMode ? '1.5px solid var(--povio-blue)' : '1px solid var(--povio-border)'),
                            borderRadius: '12px', padding: '10px 16px',
                            boxShadow: primary ? '0 4px 16px rgba(31,53,255,0.15)' : '0 1px 4px rgba(0,0,0,0.06)',
                            whiteSpace: 'nowrap'
                        }}>
                            <div style={{
                                width: '36px', height: '36px', borderRadius: '50%', flexShrink: 0,
                                background: primary ? 'linear-gradient(135deg, var(--povio-blue), #4338ca)' : 'var(--povio-blue)',
                                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: '13px', fontWeight: '700'
                            }}>{person.name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase()}</div>
                            <div>
                                <div style={{ fontSize: '14px', fontWeight: '700', color: 'var(--povio-gray-900)', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    {person.name}
                                    {editMode && <span style={{ fontSize: '10px', color: 'var(--povio-gray-400)' }}>✎</span>}
                                </div>
                                <div style={{ fontSize: '11px', color: 'var(--povio-gray-500)', marginTop: '1px' }}>{person.title}</div>
                            </div>
                        </div>
                    </div>
                );

                if (!hasChildren && !editMode) return personNode;

                const childNodes = [
                    ...managedDepts.map(d => (
                        <DeptNode
                            key={d.id}
                            dept={d}
                            membersMap={members}
                            editMode={editMode}
                            onEditDept={() => setEditingDeptId(d.id)}
                            onEditMember={(mid) => setEditingMemberId(mid)}
                            onRemoveMemberFromDept={removeMemberFromDept}
                            onAddMember={(deptId) => setPickingForDept(deptId)}
                        />
                    )),
                    ...directReports.map(reportId => (
                        <div key={reportId}>{renderPersonSubtree(reportId)}</div>
                    )),
                    ...(editMode ? [(
                        <div key={`add-${personId}`} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '6px' }}>
                            <button
                                onClick={() => addDept(personId)}
                                style={{
                                    padding: '10px 14px', background: 'var(--povio-white)',
                                    color: 'var(--povio-blue)', border: '1.5px dashed var(--povio-blue)',
                                    borderRadius: '10px', fontSize: '12px', fontWeight: '600',
                                    cursor: 'pointer', maxWidth: '220px', width: '100%'
                                }}>+ Add department</button>
                        </div>
                    )] : [])
                ];

                return (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                        {personNode}
                        {childNodes.length > 0 && <VLine h={28} />}
                        {childNodes.length > 0 && <TreeChildren>{childNodes}</TreeChildren>}
                    </div>
                );
            };

            const rootId = structure.root;
            const editingMember = editingMemberId ? members[editingMemberId] : null;
            const editingDept = editingDeptId ? structure.departments.find(d => d.id === editingDeptId) : null;

            return (
                <div style={{ padding: '0 24px 24px' }}>
                    <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: '8px', margin: '4px 0 16px' }}>
                        {saving && <span style={{ fontSize: '11px', color: 'var(--povio-gray-500)' }}>Saving…</span>}
                        {editMode && (
                            <button onClick={() => setAddingPerson(true)} style={{
                                padding: '7px 14px', background: 'var(--povio-blue)', color: '#fff',
                                border: 'none', borderRadius: '6px', fontSize: '12px', fontWeight: '600', cursor: 'pointer'
                            }}>+ Add Person</button>
                        )}
                        <button onClick={() => setEditMode(!editMode)} style={{
                            padding: '7px 14px',
                            background: editMode ? 'var(--povio-gray-900)' : 'var(--povio-white)',
                            color: editMode ? '#fff' : 'var(--povio-gray-900)',
                            border: '1px solid var(--povio-gray-900)',
                            borderRadius: '6px', fontSize: '12px', fontWeight: '600', cursor: 'pointer'
                        }}>{editMode ? 'Done Editing' : 'Edit Team'}</button>
                    </div>
                    <div style={{ overflowX: 'auto' }}>
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minWidth: '750px' }}>
                            {rootId ? renderPersonSubtree(rootId, true) : (
                                <div style={{ padding: '40px', textAlign: 'center', color: 'var(--povio-gray-500)' }}>
                                    No team yet. Click "Edit Team" to get started.
                                </div>
                            )}
                        </div>
                    </div>

                    {editingMember && (
                        <EditPersonModal
                            member={editingMember}
                            departments={structure.departments}
                            currentDeptId={null}
                            onSave={updateMember}
                            onDelete={deleteMember}
                            onClose={() => setEditingMemberId(null)}
                        />
                    )}
                    {editingDept && (
                        <EditDeptModal
                            dept={editingDept}
                            members={members}
                            onSave={updateDept}
                            onDelete={deleteDept}
                            onClose={() => setEditingDeptId(null)}
                        />
                    )}
                    {addingPerson && (
                        <AddPersonModal
                            departments={structure.departments}
                            initialDeptId={addingPersonForDept}
                            onAdd={addPerson}
                            onClose={() => { setAddingPerson(false); setAddingPersonForDept(null); }}
                        />
                    )}
                    {pickingForDept && (
                        <PickMemberModal
                            candidates={candidatesForDept(pickingForDept)}
                            onPick={(memberId) => addExistingMemberToDept(pickingForDept, memberId)}
                            onClose={() => setPickingForDept(null)}
                        />
                    )}
                </div>
            );
        };

        // Inline-editable field — click to edit, Enter/blur to save, Esc to cancel
        const InlineEdit = ({ value, display, onSave, type = 'text', options, placeholder, multiline }) => {
            const [editing, setEditing] = useState(false);
            const [draft, setDraft] = useState(value);
            const [hovered, setHovered] = useState(false);
            const inputRef = useRef(null);

            useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); if (inputRef.current.select) inputRef.current.select(); } }, [editing]);

            const startEdit = () => { setDraft(value ?? ''); setEditing(true); };
            const commit = (override) => {
                setEditing(false);
                const next = override !== undefined ? override : draft;
                if (String(next ?? '') !== String(value ?? '')) onSave(next);
            };
            const cancel = () => { setEditing(false); setDraft(value); };

            const baseInputStyle = {
                border: '1.5px solid var(--povio-blue)', borderRadius: '6px',
                padding: '6px 10px', fontSize: '13px', fontWeight: '500',
                color: 'var(--povio-gray-900)', background: 'var(--povio-white)',
                outline: 'none', minWidth: '140px', boxShadow: '0 0 0 3px rgba(31,53,255,0.08)',
                fontFamily: 'inherit'
            };

            if (editing) {
                if (options) {
                    // Selects: commit instantly on change (don't wait for blur — fires too late on some browsers)
                    return (
                        <select ref={inputRef} value={draft ?? ''}
                            onChange={e => { setDraft(e.target.value); commit(e.target.value); }}
                            onKeyDown={e => { if (e.key === 'Escape') cancel(); }}
                            onBlur={() => commit()}
                            style={{ ...baseInputStyle, maxWidth: '240px', cursor: 'pointer' }}>
                            {options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
                        </select>
                    );
                }
                if (multiline) {
                    return (
                        <textarea ref={inputRef} value={draft ?? ''}
                            onChange={e => setDraft(e.target.value)}
                            onBlur={() => commit()}
                            onKeyDown={e => { if (e.key === 'Escape') cancel(); }}
                            style={{ ...baseInputStyle, minWidth: '240px', minHeight: '60px', resize: 'vertical' }}
                        />
                    );
                }
                return (
                    <input ref={inputRef} type={type} value={draft ?? ''}
                        onChange={e => setDraft(e.target.value)}
                        onBlur={() => commit()}
                        onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') cancel(); }}
                        style={{ ...baseInputStyle, maxWidth: '240px' }}
                    />
                );
            }

            // Read view — bigger click target, always-visible pencil, clearer empty state.
            const isEmpty = value === null || value === undefined || value === '' || value === 0;
            const showAsEmpty = isEmpty && display === undefined;
            return (
                <span onClick={startEdit}
                    onMouseEnter={() => setHovered(true)}
                    onMouseLeave={() => setHovered(false)}
                    title="Click to edit"
                    style={{
                        cursor: 'pointer', borderRadius: '6px',
                        padding: '5px 10px', margin: '-5px -10px',
                        display: 'inline-flex', alignItems: 'center', gap: '8px',
                        minWidth: '90px', minHeight: '24px', justifyContent: 'flex-end',
                        background: hovered ? 'rgba(31,53,255,0.07)' : 'transparent',
                        border: hovered ? '1px dashed rgba(31,53,255,0.35)' : '1px dashed transparent',
                        transition: 'background 0.12s ease, border-color 0.12s ease',
                        textAlign: 'right', userSelect: 'none'
                    }}>
                    {showAsEmpty
                        ? <span style={{ color: 'var(--povio-gray-400)', fontStyle: 'italic', fontSize: '12px' }}>{placeholder || '+ click to add'}</span>
                        : (display ?? value)}
                    <span style={{
                        fontSize: '11px',
                        color: hovered ? 'var(--povio-blue)' : 'var(--povio-gray-400)',
                        opacity: hovered ? 1 : 0.45,
                        transition: 'opacity 0.12s ease, color 0.12s ease',
                        lineHeight: 1
                    }}>✎</span>
                </span>
            );
        };

        const WhaleView = ({ whales, onUpdate, user }) => {
            const [expandedId, setExpandedId] = useState(null);
            const [editingWhale, setEditingWhale] = useState(null);
            const [viewingHistory, setViewingHistory] = useState(null);
            const [addingNote, setAddingNote] = useState(null);
            const [whaleNotes, setWhaleNotes] = useState({});
            const [latestNotes, setLatestNotes] = useState({}); // Store latest note per whale

            // Load latest notes for all whales on mount (OPTIMIZED - Single Query)
            useEffect(() => {
                const loadLatestNotes = async () => {
                    if (whales.length === 0) return;

                    // Get all whale IDs
                    const whaleIds = whales.map(w => w.id);

                    // Fetch ALL notes for ALL whales in ONE query (10-50x faster!)
                    const { data: allNotes, error } = await supabaseClient
                        .from('whale_notes')
                        .select('*')
                        .in('whale_id', whaleIds)
                        .eq('user_id', user.id) // Defense in depth - client-side filter
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.error('Error fetching latest notes:', error);
                        return;
                    }

                    // Group by whale_id and keep only the latest per whale
                    const latestByWhale = {};
                    for (const note of allNotes) {
                        if (!latestByWhale[note.whale_id]) {
                            latestByWhale[note.whale_id] = note;
                        }
                    }

                    setLatestNotes(latestByWhale);
                };

                loadLatestNotes();
            }, [whales]);

            // Helper function to get note icon
            const getNoteIcon = (type) => {
                switch(type) {
                    case 'meeting': return '📅';
                    case 'update': return '📝';
                    case 'action': return '✓';
                    default: return '💬';
                }
            };

            // Helper function to format relative timestamp
            const formatRelativeTime = (timestamp) => {
                const date = new Date(timestamp);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 60) {
                    return diffMins === 0 ? 'Just now' : `${diffMins}m ago`;
                } else if (diffHours < 24) {
                    return `${diffHours}h ago`;
                } else if (diffDays < 7) {
                    return `${diffDays}d ago`;
                } else {
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }
            };

            // Fetch notes for a specific whale
            const fetchWhaleNotes = async (whaleId, forceRefresh = false) => {
                if (!forceRefresh && whaleNotes[whaleId]) return whaleNotes[whaleId]; // Use cached notes

                const { data, error } = await supabaseClient
                    .from('whale_notes')
                    .select('*')
                    .eq('whale_id', whaleId)
                    .eq('user_id', user.id) // Defense in depth - client-side filter
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error fetching whale notes:', error);
                    if (error.code === '42P01') {
                        console.warn('whale_notes table does not exist. Please run the database schema.');
                    }
                    return [];
                }

                setWhaleNotes(prev => ({ ...prev, [whaleId]: data || [] }));
                return data || [];
            };

            // Add a new note
            const addWhaleNote = async (whaleId, noteData, userId, userName) => {
                const { data, error } = await supabaseClient
                    .from('whale_notes')
                    .insert([{
                        whale_id: whaleId,
                        user_id: userId,
                        note_type: noteData.noteType,
                        content: noteData.content,
                        created_by: userName
                    }])
                    .select()
                    .single();

                if (error) {
                    console.error('Error adding whale note:', error);
                    if (error.code === '42P01') {
                        alert('The whale_notes table does not exist. Please run the database schema SQL in Supabase SQL Editor to create it.');
                    } else {
                        alert(`Error saving note: ${error.message}`);
                    }
                    return;
                }

                // Update local cache
                setWhaleNotes(prev => ({
                    ...prev,
                    [whaleId]: [data, ...(prev[whaleId] || [])]
                }));

                // Update latest note for this whale
                setLatestNotes(prev => ({
                    ...prev,
                    [whaleId]: data
                }));

                return data;
            };

            // Handle whale edit
            const handleEditWhale = (whale) => {
                setEditingWhale(whale);
            };

            const handleSaveWhale = (updates) => {
                const updatedWhales = whales.map(w =>
                    w.id === editingWhale.id ? { ...w, ...updates } : w
                );
                onUpdate(updatedWhales);
                setEditingWhale(null);
            };

            // Save a single field inline without opening the modal
            const handleFieldSave = (whaleId, field, value) => {
                const updatedWhales = whales.map(w =>
                    w.id === whaleId ? { ...w, [field]: value } : w
                );
                onUpdate(updatedWhales);
            };

            // Handle view history
            const handleViewHistory = async (whale) => {
                await fetchWhaleNotes(whale.id, true); // Force refresh to get latest notes
                setViewingHistory(whale);
            };

            // Handle add note
            const handleAddNoteClick = (whale) => {
                setViewingHistory(null);
                setAddingNote(whale);
            };

            const handleSaveNote = async (noteData, userId, userName) => {
                if (addingNote) {
                    const newNote = await addWhaleNote(addingNote.id, noteData, userId, userName);
                    setAddingNote(null);

                    // Force refresh notes from database and show history
                    if (newNote) {
                        await fetchWhaleNotes(addingNote.id, true);
                        setViewingHistory(addingNote);
                    }

            };

            const getHealthStats = () => {
                const healthyWhales = whales.filter(w => w.health === 'healthy');
                const warningWhales = whales.filter(w => w.health === 'warning');
                const criticalWhales = whales.filter(w => w.health === 'critical');

                // ARR can be stored as TEXT ("$500K") or NUMERIC (500)
                const healthyARR = healthyWhales.reduce((sum, w) => sum + parseARRValue(w.arr), 0);
                const warningARR = warningWhales.reduce((sum, w) => sum + parseARRValue(w.arr), 0);
                const criticalARR = criticalWhales.reduce((sum, w) => sum + parseARRValue(w.arr), 0);
                const totalARR = healthyARR + warningARR + criticalARR;

                return {
                    healthy: healthyWhales.length,
                    healthyARR: formatCurrency(healthyARR),
                    warning: warningWhales.length,
                    warningARR: formatCurrency(warningARR),
                    critical: criticalWhales.length,
                    criticalARR: formatCurrency(criticalARR),
                    totalARR: formatCurrency(totalARR)

            };

            const stats = getHealthStats();

            const WhaleRow = ({ whale }) => {

                return (

                            </div>
                            <div className="whale-metric-cell">
                                <div className="whale-metric-label">ARR</div>
                                <div className="whale-metric-value arr">{formatCurrency(whale.arr)}</div>
                            </div>
                            <div className="whale-metric-cell">
                                <div className="whale-metric-label">LTV</div>
                                <div className="whale-metric-value ltv">{formatCurrency(whale.ltv)}</div>
                            </div>
                            <div className="whale-metric-cell">

                            <div className="whale-metric-cell">

                                <div className="whale-metric-value" style={{

                            </div>
                            <span className={`health-badge ${whale.health}`}>
                                {whale.health === 'healthy' ? '✓ Healthy' : whale.health === 'warning' ? '⚠ At Risk' : '⚠ Critical'}

                        {isExpanded && (
                            <div className="whale-expanded">
                                {latestNotes[whale.id] && (

                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                                            <span style={{ fontSize: '16px' }}>{getNoteIcon(latestNotes[whale.id].note_type)}</span>
                                            <strong style={{ textTransform: 'capitalize' }}>{latestNotes[whale.id].note_type}</strong>
                                            <span style={{ color: 'var(--povio-gray-500)', fontSize: '13px' }}>•</span>
                                            <span style={{ color: 'var(--povio-gray-600)', fontSize: '13px' }}>{formatRelativeTime(latestNotes[whale.id].created_at)}</span>
                                            <span style={{ color: 'var(--povio-gray-500)', fontSize: '13px' }}>•</span>
                                            <span style={{ color: 'var(--povio-gray-600)', fontSize: '13px' }}>{latestNotes[whale.id].created_by}</span>
                                        </div>
                                        <div style={{ color: 'var(--povio-gray-700)' }}>
                                            {latestNotes[whale.id].content}

                                {!latestNotes[whale.id] && whale.notes && (
                                    <div className="whale-notes">
                                        <strong>Notes:</strong> {whale.notes}

                                <div className="whale-expanded-grid">
                                    <div className="whale-detail-section">

                                            <span className="whale-detail-label">Account Manager</span>
                                            <InlineEdit value={whale.accountManager} onSave={v => handleFieldSave(whale.id, 'accountManager', v)} />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Industry</span>
                                            <InlineEdit value={whale.industry} onSave={v => handleFieldSave(whale.id, 'industry', v)} />
                                        </div>

                                            <span className="whale-detail-label">Contract End</span>
                                            <InlineEdit
                                                value={formatDateForInput(whale.contractEnd)}
                                                display={formatDateForDisplay(whale.contractEnd)}
                                                type="date"
                                                onSave={v => handleFieldSave(whale.id, 'contractEnd', v)}
                                            />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Churn Risk</span>
                                            <InlineEdit
                                                value={whale.churnRisk}
                                                display={<span style={{ color: whale.churnRisk === 'Critical' || whale.churnRisk === 'High' ? 'var(--povio-danger)' : whale.churnRisk === 'Medium' ? 'var(--povio-warning)' : 'var(--povio-success)', fontWeight: '600' }}>{whale.churnRisk}</span>}
                                                options={['Low', 'Medium', 'High', 'Critical']}
                                                onSave={v => handleFieldSave(whale.id, 'churnRisk', v)}
                                            />
                                        </div>
                                    </div>
                                    <div className="whale-detail-section">
                                        <h4>Financial Metrics</h4>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">ARR</span>
                                            <InlineEdit
                                                value={whale.arr}
                                                display={<span style={{ color: 'var(--povio-blue)', fontWeight: '700' }}>{formatCurrency(whale.arr)}</span>}
                                                type="number"
                                                onSave={v => handleFieldSave(whale.id, 'arr', parseFloat(v))}
                                            />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">LTV</span>
                                            <InlineEdit
                                                value={whale.ltv}
                                                display={formatCurrency(whale.ltv)}
                                                type="number"
                                                onSave={v => handleFieldSave(whale.id, 'ltv', parseFloat(v))}
                                            />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Expansion</span>
                                            <InlineEdit
                                                value={whale.expansion}
                                                display={<span style={{ color: whale.expansion === 'High' ? 'var(--povio-success)' : whale.expansion === 'Medium' ? 'var(--povio-warning)' : 'var(--povio-gray-700)' }}>{whale.expansion}</span>}
                                                options={['Low', 'Medium', 'High']}
                                                onSave={v => handleFieldSave(whale.id, 'expansion', v)}
                                            />
                                        </div>

                                    <div className="whale-detail-section">
                                        <h4>QBR Schedule</h4>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Last QBR</span>
                                            <InlineEdit
                                                value={formatDateForInput(whale.lastQBR)}
                                                display={formatDateForDisplay(whale.lastQBR)}
                                                type="date"
                                                onSave={v => handleFieldSave(whale.id, 'lastQBR', v)}
                                            />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Next QBR</span>
                                            <InlineEdit
                                                value={formatDateForInput(whale.nextQBR)}
                                                display={<span style={{ color: whale.nextQBR === 'Overdue' ? 'var(--povio-danger)' : 'inherit', fontWeight: whale.nextQBR === 'Overdue' ? '700' : 'normal' }}>{whale.nextQBR !== 'Overdue' ? formatDateForDisplay(whale.nextQBR) : '⚠ Overdue'}</span>}
                                                type="date"
                                                onSave={v => handleFieldSave(whale.id, 'nextQBR', v)}
                                            />
                                        </div>
                                        <div className="whale-detail-row">
                                            <span className="whale-detail-label">Health Status</span>
                                            <InlineEdit
                                                value={whale.health}
                                                display={<span style={{ color: whale.health === 'healthy' ? 'var(--povio-success)' : whale.health === 'warning' ? 'var(--povio-warning)' : 'var(--povio-danger)', fontWeight: '600' }}>{whale.health === 'healthy' ? 'Healthy' : whale.health === 'warning' ? 'At Risk' : 'Critical'}</span>}
                                                options={[{ value: 'healthy', label: 'Healthy' }, { value: 'warning', label: 'At Risk' }, { value: 'critical', label: 'Critical' }]}
                                                onSave={v => handleFieldSave(whale.id, 'health', v)}
                                            />
                                        </div>
                                    </div>
                                </div>
                                {(whale.referrals_count > 0 || whale.referrals_revenue > 0) && (
                                    <div style={{ marginTop: '16px', padding: '12px', background: 'var(--povio-gray-100)', borderRadius: '6px', border: '1px solid var(--povio-border)' }}>
                                        <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '8px', color: 'var(--povio-gray-900)' }}>📊 Referral Impact</h4>
                                        <div style={{ display: 'flex', gap: '24px' }}>
                                            <div>
                                                <span style={{ fontSize: '12px', color: 'var(--povio-gray-600)' }}>Referrals Provided</span>
                                                <div style={{ fontSize: '20px', fontWeight: '700', color: 'var(--povio-blue)' }}>{whale.referrals_count}</div>
                                            </div>
                                            <div>
                                                <span style={{ fontSize: '12px', color: 'var(--povio-gray-600)' }}>Revenue from Referrals</span>
                                                <div style={{ fontSize: '20px', fontWeight: '700', color: 'var(--povio-success)' }}>${(whale.referrals_revenue / 1000).toFixed(0)}K</div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {whale.contacts && whale.contacts.length > 0 && (
                                    <div style={{ marginTop: '16px' }}>
                                        <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px', color: 'var(--povio-gray-900)' }}>👥 Key Contacts</h4>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '12px' }}>
                                            {whale.contacts.map((contact, idx) => (
                                                <div key={idx} style={{ padding: '12px', background: 'var(--povio-white)', border: '1px solid var(--povio-border)', borderRadius: '6px' }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                                                        <span style={{ fontSize: '16px', fontWeight: '700', color: 'var(--povio-gray-900)' }}>{contact.name}</span>
                                                        {contact.is_decision_maker && (
                                                            <span style={{ fontSize: '10px', padding: '2px 6px', background: 'var(--povio-blue)', color: 'white', borderRadius: '3px', fontWeight: '600' }}>DM</span>
                                                        )}
                                                    </div>
                                                    {contact.role && (
                                                        <div style={{ fontSize: '13px', color: 'var(--povio-gray-600)', marginBottom: '4px' }}>{contact.role}</div>
                                                    )}
                                                    {contact.email && (
                                                        <div style={{ fontSize: '12px', color: 'var(--povio-gray-700)' }}>
                                                            <a href={`mailto:${contact.email}`} style={{ color: 'var(--povio-blue)', textDecoration: 'none' }}>
                                                                ✉ {contact.email}
                                                            </a>
                                                        </div>
                                                    )}
                                                    {contact.phone && (
                                                        <div style={{ fontSize: '12px', color: 'var(--povio-gray-700)', marginTop: '2px' }}>
                                                            <a href={`tel:${contact.phone}`} style={{ color: 'var(--povio-gray-700)', textDecoration: 'none' }}>
                                                                📞 {contact.phone}
                                                            </a>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="whale-actions" style={{ marginTop: '20px', paddingTop: '16px', borderTop: '1px solid var(--povio-border)' }}>
                                    <button className="btn btn-secondary btn-small" onClick={() => handleAddNoteClick(whale)}>+ Add Note</button>
                                    <button className="btn btn-secondary btn-small" onClick={() => handleViewHistory(whale)}>View History</button>
                                    <button className="btn btn-secondary btn-small" onClick={() => handleEditWhale(whale)}>Edit All Fields</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <>
                    <div className="status-legend">
                        <div className="status-legend-item">
                            <span className="dot on-track"></span> {stats.healthy} Healthy
                            <span style={{ marginLeft: '8px', fontWeight: '600', color: 'var(--povio-success)' }}>({stats.healthyARR})</span>
                        </div>
                        <div className="status-legend-item">
                            <span className="dot at-risk"></span> {stats.warning} At Risk
                            <span style={{ marginLeft: '8px', fontWeight: '600', color: 'var(--povio-warning)' }}>({stats.warningARR})</span>
                        </div>
                        <div className="status-legend-item">
                            <span className="dot behind"></span> {stats.critical} Critical
                            <span style={{ marginLeft: '8px', fontWeight: '600', color: 'var(--povio-danger)' }}>({stats.criticalARR})</span>
                        </div>
                        <div className="status-legend-item" style={{ marginLeft: 'auto', fontWeight: '700', color: 'var(--povio-blue)' }}>
                            Total ARR: {stats.totalARR}
                        </div>
                    </div>
                    <div className="whale-list">
                        {whales.map(whale => <WhaleRow key={whale.id} whale={whale} />)}
                    </div>

                    {/* Edit Whale Modal */}
                    <Modal
                        isOpen={!!editingWhale}
                        onClose={() => setEditingWhale(null)}

                    >
                        {editingWhale && (

                                onSave={handleSaveWhale}
                                onCancel={() => setEditingWhale(null)}

                    </Modal>

                    {/* Add Note Modal */}
                    <Modal
                        isOpen={!!addingNote}
                        onClose={() => setAddingNote(null)}
                        title="Add Note"
                    >
                        {addingNote && (
                            <AddNoteForm
                                onSave={(noteData) => handleSaveNote(noteData, user.id, user.name || user.email)}
                                onCancel={() => setAddingNote(null)}
                            />
                        )}
                    </Modal>

                    {/* View History Modal */}
                    <Modal
                        isOpen={!!viewingHistory}
                        onClose={() => setViewingHistory(null)}
                        title={`Account History - ${viewingHistory?.name || ''}`}
                    >
                        {viewingHistory && (
                            <NotesHistoryModal
                                notes={whaleNotes[viewingHistory.id] || []}
                                onClose={() => setViewingHistory(null)}
                                onAddNote={() => handleAddNoteClick(viewingHistory)}
                            />
                        )}
                    </Modal>
                </>
            );
        };

        // ==================== LOGIN SCREEN ====================
        // =====================================================================
        // MERGED VIEWS — added by migration 002 (Sales Command Center)
        // Dashboard, AccountsView (replaces WhaleView for the 198-account list),
        // MyWeekView, ProcessView, AdminView (incl. import flow).
        // =====================================================================

        // Format ARR (whales.arr is stored in thousands: 500 = $500K, 2500 = $2.5M)
        const fmtARR = (arr) => {
            const v = parseFloat(arr) || 0;
            if (v >= 1000) return '$' + (v / 1000).toFixed(1) + 'M';
            if (v >= 1)    return '$' + Math.round(v) + 'K';
            return '—';
        };
        const relTime = (dateStr) => {
            if (!dateStr) return '—';
            const d = parseDate(dateStr);
            if (!d) return '—';
            const days = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
            if (days === 0) return 'today';
            if (days === 1) return 'yesterday';
            if (days < 7) return days + 'd ago';
            if (days < 30) return Math.floor(days / 7) + 'w ago';
            if (days < 365) return Math.floor(days / 30) + 'mo ago';
            return Math.floor(days / 365) + 'y ago';
        };

        // ============== Dashboard ==============
        const DashboardView = ({ whales, goals, allowedUsers, setView }) => {
            const total = whales.length;
            const totalARR = whales.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0);
            const healthy = whales.filter(w => (w.health || '').toLowerCase() === 'healthy');
            const atRisk  = whales.filter(w => (w.health || '').toLowerCase() === 'at_risk' || (w.health || '').toLowerCase() === 'warning');
            const critical = whales.filter(w => (w.health || '').toLowerCase() === 'critical');
            const keyAccts = whales.filter(w => w.is_key_account);
            const totalFTE = whales.reduce((s, w) => s + (parseFloat(w.fte) || 0), 0);

            return (

                    <div className="stats-bar" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>

                            <div className="value">{total}</div>
                            <div className="sub">{keyAccts.length} key · {totalFTE.toFixed(1)} FTE total</div>
                        </div>
                        <div className="kpi-card">
                            <h3>Total ARR (est)</h3>
                            <div className="value blue">{fmtARR(totalARR)}</div>
                            <div className="sub">From FTE × $180k where ARR not contracted</div>
                        </div>
                        <div className="kpi-card">
                            <h3>Revenue at risk</h3>
                            <div className="value yellow">{fmtARR(atRisk.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0) + critical.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</div>
                            <div className="sub">{atRisk.length} at risk · {critical.length} critical</div>
                        </div>
                        <div className="kpi-card">
                            <h3>Goals on track</h3>
                            <div className="value green">{goals.filter(g => calculateGoalStatus(g.milestones) === 'on-track' || calculateGoalStatus(g.milestones) === 'complete').length}</div>
                            <div className="sub">of {goals.length} total — <span style={{ color: 'var(--povio-blue)', cursor: 'pointer' }} onClick={() => setView('goals')}>view all →</span></div>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 16 }}>
                        <div className="kpi-card">
                            <h3>Account health</h3>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 12 }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: 'var(--povio-success-subtle)', borderRadius: 10 }}>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--povio-success)', textTransform: 'uppercase' }}>Healthy</span>
                                    <span style={{ fontWeight: 800, color: 'var(--povio-success)' }}>{healthy.length} · {fmtARR(healthy.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</span>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: 'var(--povio-warning-subtle)', borderRadius: 10 }}>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--povio-warning)', textTransform: 'uppercase' }}>At risk</span>
                                    <span style={{ fontWeight: 800, color: 'var(--povio-warning)' }}>{atRisk.length} · {fmtARR(atRisk.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</span>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: 'var(--povio-danger-subtle)', borderRadius: 10 }}>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--povio-danger)', textTransform: 'uppercase' }}>Critical</span>
                                    <span style={{ fontWeight: 800, color: 'var(--povio-danger)' }}>{critical.length} · {fmtARR(critical.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</span>
                                </div>
                            </div>
                        </div>

                        <div className="kpi-card">
                            <h3>Coverage by AM</h3>
                            <table className="data-table" style={{ marginTop: 12, border: 'none' }}>
                                <thead><tr><th>AM</th><th>Accounts</th><th>ARR</th></tr></thead>
                                <tbody>
                                    {allowedUsers.filter(u => u.role === 'rep' && u.povio_id !== 'u_unassigned').map(u => {
                                        const owned = whales.filter(w => w.owner_povio_id === u.povio_id);
                                        return (
                                            <tr key={u.povio_id}>
                                                <td><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><div style={{ width: 22, height: 22, borderRadius: '50%', background: u.color || '#A3A3A3', color: 'white', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700 }}>{u.initials}</div>{u.name}</div></td>
                                                <td><strong>{owned.length}</strong></td>
                                                <td style={{ color: 'var(--povio-blue)', fontWeight: 700 }}>{fmtARR(owned.reduce((s, w) => s + (parseFloat(w.arr) || 0), 0))}</td>
                                            </tr>

                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ============== Accounts (full 198-row list) ==============
        const AccountsView = ({ whales, allowedUsers, onUpdate, onWhalesRefresh, currentPovioUser, user }) => {
            // Selected row → opens slide-out sidebar on the right. Click another
            // row to swap; click ✕ / Esc / same-row again to close.
            const [selectedId, setSelectedId] = useState(null);
            const [activeTab, setActiveTab] = useState('overview');
            const [search, setSearch] = useState('');
            const [filterOwner, setFilterOwner] = useState('all');
            const [filterHealth, setFilterHealth] = useState('all');
            const [keyOnly, setKeyOnly] = useState(false);
            const [savingField, setSavingField] = useState(null);  // visual feedback during save
            const isAdmin = currentPovioUser?.role === 'admin';

            const ownersById = useMemo(() => {
                const m = new Map();
                allowedUsers.forEach(u => m.set(u.povio_id, u));
                return m;
            }, [allowedUsers]);

            // Close the sidebar on Esc key — universal "dismiss panel" affordance.
            useEffect(() => {
                if (!selectedId) return;
                const onKey = (e) => { if (e.key === 'Escape') setSelectedId(null); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [selectedId]);

            // Currently-selected whale, looked up freshly so saveField+refetch
            // updates flow through naturally without needing setState dance.
            const selectedWhale = selectedId ? whales.find(w => w.id === selectedId) : null;

            // Save a single field to Supabase, then refresh the whales list.
            // Used by all the InlineEdit components in the Overview tab.
            // The migration-004 trigger handles audit logging server-side, so
            // we don't need to do it here.
            const saveField = async (whaleId, fieldName, rawValue) => {
                let value = rawValue;
                // Normalize numeric strings to actual numbers for the DB
                if (['arr','ltv','fte','referrals_count','referrals_revenue'].includes(fieldName)) {
                    const n = parseFloat(value);
                    value = isNaN(n) ? null : n;
                }
                // Empty string → null for cleaner DB state
                if (value === '') value = null;

                setSavingField(whaleId + ':' + fieldName);
                const { error } = await supabaseClient
                    .from('whales')
                    .update({ [fieldName]: value })
                    .eq('id', whaleId);
                setSavingField(null);
                if (error) {
                    console.error('saveField error', error);
                    alert('Save failed: ' + (error.message || 'unknown error'));
                    return;
                }
                if (onWhalesRefresh) await onWhalesRefresh();
            };

            // Save a JSON column (team_members, qbr_history, etc.) — needs special
            // handling since InlineEdit produces strings; we parse + reshape.
            const saveJsonArray = async (whaleId, fieldName, arrayValue) => {
                setSavingField(whaleId + ':' + fieldName);
                const { error } = await supabaseClient
                    .from('whales')
                    .update({ [fieldName]: arrayValue })
                    .eq('id', whaleId);
                setSavingField(null);
                if (error) { console.error('saveJsonArray error', error); alert('Save failed: ' + error.message); return; }
                if (onWhalesRefresh) await onWhalesRefresh();
            };

            const filtered = whales.filter(w => {
                if (filterOwner === 'unassigned') {
                    if (w.owner_povio_id) return false;
                } else if (filterOwner !== 'all' && w.owner_povio_id !== filterOwner) return false;
                if (filterHealth !== 'all' && (w.health || '').toLowerCase() !== filterHealth) return false;
                if (keyOnly && !w.is_key_account) return false;
                if (search && !(w.name || '').toLowerCase().includes(search.toLowerCase())) return false;
                return true;
            });

            const healthCounts = {
                healthy: whales.filter(w => (w.health || '').toLowerCase() === 'healthy').length,
                at_risk: whales.filter(w => ['at_risk', 'warning'].includes((w.health || '').toLowerCase())).length,
                critical: whales.filter(w => (w.health || '').toLowerCase() === 'critical').length
            };

            const updateField = async (whale, field, newValue) => {
                const next = whales.map(w => w.id === whale.id ? { ...w, [field]: newValue } : w);
                await onUpdate(next);
            };

            return (
                <div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 18, gap: 12, flexWrap: 'wrap' }}>

                            <p style={{ fontSize: 13, color: 'var(--povio-gray-500)', marginTop: 2 }}>

                                {' '}<span style={{ color: 'var(--povio-success)' }}>{healthCounts.healthy} healthy</span> ·
                                {' '}<span style={{ color: 'var(--povio-warning)' }}>{healthCounts.at_risk} at risk</span> ·
                                {' '}<span style={{ color: 'var(--povio-danger)' }}>{healthCounts.critical} critical</span>
                            </p>
                        </div>
                    </div>

                    <div className="filters-bar">

                        <select value={filterOwner} onChange={e => setFilterOwner(e.target.value)}>

                            <option value="unassigned">— Unassigned —</option>
                            {allowedUsers.filter(u => u.povio_id).map(u => <option key={u.povio_id} value={u.povio_id}>{u.name}</option>)}
                        </select>
                        <select value={filterHealth} onChange={e => setFilterHealth(e.target.value)}>
                            <option value="all">All health</option>
                            <option value="healthy">Healthy</option>
                            <option value="at_risk">At risk</option>
                            <option value="critical">Critical</option>
                        </select>
                        <button className={'toggle-pill ' + (keyOnly ? 'active' : '')} onClick={() => setKeyOnly(!keyOnly)}>🐋 Key only</button>

                    {filtered.length === 0 ? (

                            <p style={{ fontSize: 12 }}>Try clearing filters or run the import (Admin → Import) if no data yet.</p>
                        </div>
                    ) : filtered.map(w => {
                        const owner = ownersById.get(w.owner_povio_id);
                        const isSelected = selectedId === w.id;
                        const healthClass = ['healthy', 'at_risk', 'critical'].includes((w.health || '').toLowerCase()) ? (w.health || '').toLowerCase() : 'healthy';
                        return (
                            <div className={'account-row ' + healthClass + (isSelected ? ' selected' : '')} key={w.id}>

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare deployment files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          # accounts-seed.js is intentionally NOT copied — the one-time import has
          # been run (see migration history) and the file contains real customer
          # names, FTE allocations, and team-channel handles that should not be
          # publicly accessible. The file stays in-repo as a disaster-recovery
          # re-seed but is no longer served by GitHub Pages.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/import-html-app-9MWX1
      - claude/povio-sales-calendar-BLibA
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare deployment files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          # Lazy-loaded by the Admin > Import flow (one-time 198-account seed).
          # Will be removed in a follow-up commit after the import has run.
          [ -f accounts-seed.js ] && cp accounts-seed.js _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
